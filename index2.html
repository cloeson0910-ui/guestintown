<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMMONOVA</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #d8c1a0;
      font-family: "Georgia", serif;
    }

    .landing {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(120deg, #d6bd99, #e5d0ad);
    }

    .triangles {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(60deg, rgba(120, 95, 60, .12) 1px, transparent 1px),
        linear-gradient(-60deg, rgba(120, 95, 60, .10) 1px, transparent 1px);
      background-size: 110px 95px;
      mask-image: linear-gradient(to right, black 0%, transparent 70%);
      opacity: .55;
      animation: trianglesFade 2.8s ease forwards;
    }

    @keyframes trianglesFade {
      from {
        transform: translateX(-80px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: .55;
      }
    }

    .content {
      position: relative;
      text-align: center;
      z-index: 2;
    }

    .title {
      font-size: clamp(48px, 8vw, 120px);
      letter-spacing: .22em;
      color: #c99a3d;
      font-weight: 400;
      text-transform: uppercase;
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      animation: writeText 2.6s ease forwards;
      position: relative;
    }

    @keyframes writeText {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }

    .title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 80%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255, 244, 190, .9),
        transparent
      );
      animation: goldLight 1.6s ease forwards;
      animation-delay: 2.7s;
    }

    @keyframes goldLight {
      from {
        left: 120%;
      }
      to {
        left: -120%;
      }
    }

    .line {
      width: 0;
      height: 1px;
      background: #b88a32;
      margin: 28px auto 22px;
      animation: lineGrow 1s ease forwards;
      animation-delay: 2.2s;
    }

    @keyframes lineGrow {
      to {
        width: 320px;
      }
    }

    .subtitle {
      font-family: Arial, sans-serif;
      font-size: clamp(13px, 1.5vw, 18px);
      letter-spacing: .55em;
      color: #7c633d;
      text-transform: uppercase;
      opacity: 0;
      animation: subtitleFade 1.2s ease forwards;
      animation-delay: 2.8s;
    }

    @keyframes subtitleFade {
      to {
        opacity: 1;
      }
    }

    @media (max-width: 700px) {
      .title {
        letter-spacing: .14em;
      }

      .line {
        max-width: 220px;
      }

      .subtitle {
        letter-spacing: .32em;
      }
    }
  </style>
</head>

<body>
  <section class="landing">
    <div class="triangles"></div>

    <div class="content">
      <h1 class="title">IMMONOVA</h1>
      <div class="line"></div>
      <div class="subtitle">OFF MARKET CONSULTING</div>
    </div>
  </section>
</body>
</html>
