<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servizi Concierge - Guest in Town</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}body{background:#050505;color:#f5efe4;font-family:Arial,sans-serif;}.container{max-width:1250px;margin:auto;padding:40px 28px 90px;}.header{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:60px;}.logo{font-family:Georgia,"Times New Roman",serif;color:#c9a96e;font-size:26px;letter-spacing:4px;text-transform:uppercase;}.nav a{color:#c9a96e;border:1px solid rgba(201,169,110,.45);padding:12px 18px;text-decoration:none;text-transform:uppercase;font-size:12px;letter-spacing:1px;}.hero{text-align:center;margin-bottom:60px;}.hero h1{font-family:Georgia,"Times New Roman",serif;font-size:56px;color:#c9a96e;font-weight:400;margin-bottom:18px;}.hero p{color:#bbb;line-height:1.8;max-width:780px;margin:auto;}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;}.card{background:#0f0f0f;border:1px solid rgba(201,169,110,.25);padding:28px;text-decoration:none;color:#f5efe4;min-height:230px;display:block;transition:.25s;}.card:hover{border-color:#c9a96e;transform:translateY(-4px);}.card i{font-size:34px;color:#c9a96e;margin-bottom:22px;}.card h2{font-family:Georgia,"Times New Roman",serif;font-size:30px;color:#f5efe4;font-weight:400;margin-bottom:14px;}.card p{color:#aaa;line-height:1.7;}.empty{background:#0f0f0f;border:1px solid rgba(201,169,110,.25);padding:35px;text-align:center;color:#aaa;}
</style>
</head>
<body>
<div class="container">
<div class="header"><div class="logo">Guest Concierge</div><div class="nav"><a href="../">Home</a><a href="villas.html">Ville</a></div></div>
<section class="hero"><h1>Servizi extra su richiesta</h1><p>Professionisti selezionati da Guest in Town per rendere il soggiorno ancora più esclusivo. Ogni servizio è prenotabile con almeno 24 ore di preavviso.</p></section>
<div class="grid" id="servicesGrid"></div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const villaId = params.get('villa_id') || '';

loadServices();
async function loadServices(){
const { data, error } = await supabaseClient.from('concierge_services').select('*').eq('active', true).order('sort_order');
const grid = document.getElementById('servicesGrid');
if(error){grid.innerHTML = '<div class="empty">'+error.message+'</div>';return;}
if(!data || data.length === 0){grid.innerHTML = '<div class="empty">Nessun servizio disponibile al momento.</div>';return;}
grid.innerHTML = '';
data.forEach(service=>{grid.innerHTML += `<a class="card" href="service.html?id=${service.id}${villaId ? '&villa_id=' + villaId : ''}"><i class="${service.icon_class || 'fa-solid fa-star'}"></i><h2>${service.name || ''}</h2><p>${service.description || 'Servizio extra Guest in Town su richiesta.'}</p></a>`;});
}
</script>
</body>
</html>
