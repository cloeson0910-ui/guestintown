<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ville - Guest In Town</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f7f4ef;
color:#111;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
gap:20px;
}

h1{
font-size:42px;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
background:#ddd;
}

.card-content{
padding:20px;
}

.card h2{
margin:0 0 10px;
font-size:24px;
}

.meta{
color:#777;
margin-bottom:15px;
}

.info{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-bottom:15px;
font-size:14px;
}

.info span{
background:#f2eee7;
padding:8px 10px;
border-radius:8px;
}

.button{
display:inline-block;
background:#111;
color:white;
padding:12px 18px;
border-radius:8px;
text-decoration:none;
}

.empty{
background:white;
padding:40px;
border-radius:18px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1 id="pageTitle">Ville</h1>
<a href="../index.html" class="button">Home</a>
</div>

<div id="villasGrid" class="grid"></div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const destinationId =
params.get('destination_id');

loadVillas();

async function loadVillas(){

let query =
supabaseClient
.from('villas')
.select(`
*,
destinations(id,name)
`)
.order('created_at',{ascending:false});

if(destinationId){
query = query.eq('destination_id', destinationId);
}

const { data: villas, error } = await query;

if(error){
document.getElementById('villasGrid').innerHTML =
`<div class="empty">${error.message}</div>`;
return;
}

const visibleVillas =
(villas || []).filter(villa =>
villa.status === 'published' ||
villa.status === 'approved' ||
villa.published === true
);

if(visibleVillas.length === 0){
document.getElementById('villasGrid').innerHTML =
`<div class="empty">Nessuna villa disponibile.</div>`;
return;
}

if(destinationId && visibleVillas[0]?.destinations?.name){
document.getElementById('pageTitle').innerText =
`Ville a ${visibleVillas[0].destinations.name}`;
}

const grid =
document.getElementById('villasGrid');

for(const villa of visibleVillas){

const { data: images } =
await supabaseClient
.from('villa_images')
.select('*')
.eq('villa_id', villa.id);

const mainImage =
images?.find(img => img.image_type === 'main')?.image_url
|| images?.[0]?.image_url
|| '';

grid.innerHTML += `
<div class="card">
${mainImage ? `<img src="${mainImage}">` : `<img>`}

<div class="card-content">
<h2>${villa.title || ''}</h2>

<div class="meta">
${villa.destinations?.name || ''}
</div>

<div class="info">
<span>${villa.max_guests || '-'} ospiti</span>
<span>${villa.bedrooms || '-'} camere</span>
<span>${villa.bathrooms || '-'} bagni</span>
</div>

<a class="button" href="villa.html?id=${villa.id}">
Scopri la villa
</a>
</div>
</div>
`;

}

}

</script>

</body>
</html>
