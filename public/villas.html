<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Destinazioni - Guest in Town</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#050505;
color:white;
font-family:Georgia,"Times New Roman",serif;
}

.container{
max-width:1350px;
margin:auto;
padding:40px 30px 90px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:60px;
}

.logo{
color:#c9a96e;
font-size:24px;
letter-spacing:4px;
text-transform:uppercase;
}

.nav a{
color:#c9a96e;
border:1px solid rgba(201,169,110,.55);
padding:12px 20px;
text-decoration:none;
font-family:Arial,sans-serif;
font-size:13px;
letter-spacing:1px;
text-transform:uppercase;
}

.hero{
text-align:center;
margin-bottom:70px;
}

.hero h1{
font-size:58px;
font-weight:400;
color:#c9a96e;
margin-bottom:18px;
}

.hero p{
font-family:Arial,sans-serif;
color:#bbb;
font-size:17px;
line-height:1.8;
max-width:760px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(310px,1fr));
gap:30px;
}

.card{
position:relative;
height:420px;
overflow:hidden;
background:#111;
border:1px solid rgba(201,169,110,.35);
text-decoration:none;
color:white;
display:block;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
filter:brightness(.62);
transition:.6s;
}

.card:hover img{
transform:scale(1.07);
filter:brightness(.48);
}

.card-overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.88),rgba(0,0,0,.08));
display:flex;
align-items:flex-end;
padding:34px;
z-index:2;
}

.card h2{
font-size:38px;
font-weight:400;
color:#f5efe4;
margin-bottom:10px;
}

.card span{
font-family:Arial,sans-serif;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
color:#c9a96e;
}

.empty{
background:#111;
border:1px solid rgba(201,169,110,.3);
padding:45px;
text-align:center;
color:#bbb;
font-family:Arial,sans-serif;
}

.info{
display:flex;
gap:12px;
flex-wrap:wrap;
margin:18px 0;
font-family:Arial,sans-serif;
}

.info span{
background:rgba(201,169,110,.16);
border:1px solid rgba(201,169,110,.28);
color:#f5efe4;
padding:8px 10px;
font-size:13px;
letter-spacing:0;
text-transform:none;
}

.button{
display:inline-block;
margin-top:12px;
color:#050505;
background:#c9a96e;
padding:12px 18px;
font-family:Arial,sans-serif;
font-size:13px;
text-decoration:none;
letter-spacing:1px;
text-transform:uppercase;
font-weight:bold;
}

@media(max-width:700px){
.header{flex-direction:column;align-items:flex-start;gap:20px;}
.hero h1{font-size:40px;}
.card{height:340px;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">Guest in Town</div>
<div class="nav">
<a href="../">Home</a>
</div>
</div>

<section class="hero">
<h1 id="pageTitle">Le destinazioni</h1>
<p id="pageSubtitle">
Scopra le province e i territori selezionati da Guest in Town:
dimore private, ville esclusive e soggiorni di lusso nel cuore della Puglia.
</p>
</section>

<div id="content" class="grid"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const checkIn = params.get('check_in');
const checkOut = params.get('check_out');
const guests = params.get('guests');

if(checkIn && checkOut){
loadAvailableVillas();
} else {
loadDestinations();
}

function normalizeName(name){
return (name || '')
.toLowerCase()
.normalize('NFD')
.replace(/[\u0300-\u036f]/g,'');
}

function getDestinationImage(name){

const n = normalizeName(name);

if(n.includes('alberobello')){
return 'https://loremflickr.com/1600/1100/alberobello,trulli,puglia?lock=11';
}

if(n.includes('bari')){
return 'https://loremflickr.com/1600/1100/polignano,mare,puglia?lock=12';
}

if(n.includes('brindisi')){
return 'https://loremflickr.com/1600/1100/ostuni,puglia,ulivi?lock=13';
}

if(n.includes('fasano')){
return 'https://loremflickr.com/1600/1100/masseria,puglia,ulivi?lock=14';
}

if(n.includes('ostuni')){
return 'https://loremflickr.com/1600/1100/ostuni,puglia?lock=15';
}

if(n.includes('lecce')){
return 'https://loremflickr.com/1600/1100/lecce,puglia,barocco?lock=16';
}

if(n.includes('otranto')){
return 'https://loremflickr.com/1600/1100/otranto,salento,mare?lock=17';
}

if(n.includes('gallipoli')){
return 'https://loremflickr.com/1600/1100/gallipoli,salento,mare?lock=18';
}

if(n.includes('taranto')){
return 'https://loremflickr.com/1600/1100/taranto,puglia,mare?lock=19';
}

if(n.includes('salento')){
return 'https://loremflickr.com/1600/1100/salento,puglia,mare?lock=20';
}

if(n.includes('valle')){
return 'https://loremflickr.com/1600/1100/valle-itria,puglia,trulli?lock=21';
}

return 'https://loremflickr.com/1600/1100/puglia,ulivi,masseria?lock=22';

}

function formatEuro(value){

const number = Number(value || 0);

return number.toLocaleString('it-IT',{
style:'currency',
currency:'EUR'
});

}

async function loadDestinations(){

const { data: destinations, error } =
await supabaseClient
.from('destinations')
.select('id,name')
.order('name');

if(error){
document.getElementById('content').innerHTML =
`<div class="empty">${error.message}</div>`;
return;
}

if(!destinations || destinations.length === 0){
document.getElementById('content').innerHTML =
'<div class="empty">Nessuna destinazione disponibile.</div>';
return;
}

const content = document.getElementById('content');

content.innerHTML = '';

destinations.forEach(destination=>{

const imageUrl = getDestinationImage(destination.name);

content.innerHTML += `
<a class="card" href="destination.html?id=${destination.id}">
<img src="${imageUrl}" alt="${destination.name}" loading="lazy">

<div class="card-overlay">
<div>
<h2>${destination.name}</h2>
<span>Scopri i paesi</span>
</div>
</div>
</a>
`;

});

}

async function loadAvailableVillas(){

document.getElementById('pageTitle').innerText =
'Ville disponibili';

document.getElementById('pageSubtitle').innerText =
'Le ville disponibili nelle date selezionate, filtrate automaticamente in base alle prenotazioni già presenti.';

let query =
supabaseClient
.from('villas')
.select(`
*,
destinations(id,name)
`)
.or('status.eq.published,status.eq.approved,published.eq.true')
.order('created_at',{ascending:false});

if(guests){
query = query.gte('max_guests', guests);
}

const { data: villas, error } = await query;

if(error){
document.getElementById('content').innerHTML =
`<div class="empty">${error.message}</div>`;
return;
}

const availableVillas = [];

for(const villa of villas || []){

const { data: overlaps } =
await supabaseClient
.from('bookings')
.select('id')
.eq('villa_id', villa.id)
.in('status',['pending','confirmed'])
.lt('check_in', checkOut)
.gt('check_out', checkIn);

if(!overlaps || overlaps.length === 0){
availableVillas.push(villa);
}

}

if(availableVillas.length === 0){
document.getElementById('content').innerHTML =
'<div class="empty">Nessuna villa disponibile nelle date selezionate.</div>';
return;
}

const content = document.getElementById('content');

content.innerHTML = '';

for(const villa of availableVillas){

const { data: images } =
await supabaseClient
.from('villa_images')
.select('*')
.eq('villa_id', villa.id);

const mainImage =
images?.find(img => img.image_type === 'main')?.image_url
|| images?.[0]?.image_url
|| '';

content.innerHTML += `
<div class="card">
<img src="${mainImage || getDestinationImage(villa.destinations?.name)}" alt="${villa.title || ''}" loading="lazy">

<div class="card-overlay">
<div>
<h2>${villa.title || ''}</h2>
<span>${villa.destinations?.name || ''}</span>

<div class="info">
<span>${villa.max_guests || '-'} ospiti</span>
<span>${villa.bedrooms || '-'} camere</span>
<span>${villa.bathrooms || '-'} bagni</span>
${villa.nightly_price ? `<span>Da ${formatEuro(villa.nightly_price)} / notte</span>` : ''}
</div>

<a class="button" href="villa.html?id=${villa.id}">
Scopri la villa
</a>
</div>
</div>
</div>
`;

}

}

</script>

</body>
</html>
