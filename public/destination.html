<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Destinazione - Guest in Town</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#050505;
color:white;
font-family:Georgia,"Times New Roman",serif;
}

.container{
max-width:1350px;
margin:auto;
padding:40px 30px 90px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:60px;
}

.logo{
color:#c9a96e;
font-size:24px;
letter-spacing:4px;
text-transform:uppercase;
}

.nav{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.nav a{
color:#c9a96e;
border:1px solid rgba(201,169,110,.55);
padding:12px 20px;
text-decoration:none;
font-family:Arial,sans-serif;
font-size:13px;
letter-spacing:1px;
text-transform:uppercase;
}

.hero{
text-align:center;
margin-bottom:70px;
}

.hero h1{
font-size:58px;
font-weight:400;
color:#c9a96e;
margin-bottom:18px;
}

.hero p{
font-family:Arial,sans-serif;
color:#bbb;
font-size:17px;
line-height:1.8;
max-width:760px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(310px,1fr));
gap:30px;
}

.card{
position:relative;
height:420px;
overflow:hidden;
background:#111;
border:1px solid rgba(201,169,110,.35);
text-decoration:none;
color:white;
display:block;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
filter:brightness(.62);
transition:.6s;
}

.card:hover img{
transform:scale(1.07);
filter:brightness(.48);
}

.card-overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.88),rgba(0,0,0,.08));
display:flex;
align-items:flex-end;
padding:34px;
z-index:2;
}

.card h2{
font-size:38px;
font-weight:400;
color:#f5efe4;
margin-bottom:10px;
}

.card span{
font-family:Arial,sans-serif;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
color:#c9a96e;
}

.empty{
background:#111;
border:1px solid rgba(201,169,110,.3);
padding:45px;
text-align:center;
color:#bbb;
font-family:Arial,sans-serif;
}

@media(max-width:700px){
.header{flex-direction:column;align-items:flex-start;gap:20px;}
.hero h1{font-size:40px;}
.card{height:340px;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">Guest in Town</div>

<div class="nav">
<a href="../">Home</a>
<a href="villas.html">Destinazioni</a>
</div>
</div>

<section class="hero">
<h1 id="pageTitle">Destinazione</h1>
<p id="pageSubtitle">
Scopra i paesi selezionati in questa destinazione e scelga la villa più adatta al suo soggiorno.
</p>
</section>

<div id="content" class="grid"></div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const destinationId =
params.get('id');

loadDestination();

function normalizeName(name){
return (name || '')
.toLowerCase()
.normalize('NFD')
.replace(/[\u0300-\u036f]/g,'');
}

function getTownImage(name){

const n = normalizeName(name);

if(n.includes('alberobello')){
return 'https://loremflickr.com/1600/1100/alberobello,trulli,puglia?lock=101';
}

if(n.includes('ostuni')){
return 'https://loremflickr.com/1600/1100/ostuni,puglia,white-town?lock=102';
}

if(n.includes('cisternino')){
return 'https://loremflickr.com/1600/1100/cisternino,puglia,white-town?lock=103';
}

if(n.includes('carovigno')){
return 'https://loremflickr.com/1600/1100/carovigno,puglia,olive?lock=104';
}

if(n.includes('francavilla')){
return 'https://loremflickr.com/1600/1100/francavilla-fontana,puglia?lock=105';
}

if(n.includes('fasano')){
return 'https://loremflickr.com/1600/1100/fasano,puglia,masseria?lock=106';
}

if(n.includes('polignano')){
return 'https://loremflickr.com/1600/1100/polignano-a-mare,puglia?lock=107';
}

if(n.includes('monopoli')){
return 'https://loremflickr.com/1600/1100/monopoli,puglia,sea?lock=108';
}

if(n.includes('lecce')){
return 'https://loremflickr.com/1600/1100/lecce,puglia,baroque?lock=109';
}

if(n.includes('otranto')){
return 'https://loremflickr.com/1600/1100/otranto,salento,sea?lock=110';
}

if(n.includes('gallipoli')){
return 'https://loremflickr.com/1600/1100/gallipoli,salento,sea?lock=111';
}

if(n.includes('porto cesareo')){
return 'https://loremflickr.com/1600/1100/porto-cesareo,salento,sea?lock=112';
}

if(n.includes('nard')){
return 'https://loremflickr.com/1600/1100/nardo,salento,puglia?lock=113';
}

if(n.includes('ugento')){
return 'https://loremflickr.com/1600/1100/ugento,salento,sea?lock=114';
}

return 'https://loremflickr.com/1600/1100/puglia,ulivi,masseria?lock=115';

}

async function loadDestination(){

if(!destinationId){
document.getElementById('content').innerHTML =
'<div class="empty">Destinazione non trovata.</div>';
return;
}

const { data: destination, error: destinationError } =
await supabaseClient
.from('destinations')
.select('*')
.eq('id', destinationId)
.single();

if(destinationError || !destination){
document.getElementById('content').innerHTML =
'<div class="empty">Destinazione non trovata.</div>';
return;
}

document.getElementById('pageTitle').innerText =
destination.name || 'Destinazione';

const { data: towns, error: townsError } =
await supabaseClient
.from('towns')
.select('*')
.eq('destination_id', destinationId)
.order('name');

if(townsError){
document.getElementById('content').innerHTML =
`<div class="empty">${townsError.message}</div>`;
return;
}

if(!towns || towns.length === 0){
document.getElementById('content').innerHTML =
'<div class="empty">Nessun paese disponibile per questa destinazione.</div>';
return;
}

const content =
document.getElementById('content');

content.innerHTML = '';

towns.forEach(town=>{

const imageUrl =
town.image_url || getTownImage(town.name);

content.innerHTML += `
<a class="card" href="town.html?id=${town.id}">
<img src="${imageUrl}" alt="${town.name}" loading="lazy">

<div class="card-overlay">
<div>
<h2>${town.name}</h2>
<span>Scopri le ville</span>
</div>
</div>
</a>
`;

});

}

</script>

</body>
</html>
