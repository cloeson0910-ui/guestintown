<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Destinazione - Guest in Town</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;color:white;font-family:Georgia,"Times New Roman",serif;}
.container{max-width:1350px;margin:auto;padding:40px 30px 90px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:60px;gap:20px;}
.logo{color:#c9a96e;font-size:24px;letter-spacing:4px;text-transform:uppercase;}
.nav{display:flex;gap:12px;flex-wrap:wrap;}
.nav a{color:#c9a96e;border:1px solid rgba(201,169,110,.55);padding:12px 20px;text-decoration:none;font-family:Arial,sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;}
.hero{text-align:center;margin-bottom:70px;}
.hero h1{font-size:58px;font-weight:400;color:#c9a96e;margin-bottom:18px;}
.hero p{font-family:Arial,sans-serif;color:#bbb;font-size:17px;line-height:1.8;max-width:760px;margin:auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:30px;}
.card{position:relative;height:420px;overflow:hidden;background:#111;border:1px solid rgba(201,169,110,.35);text-decoration:none;color:white;display:block;}
.card img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.62);transition:.6s;}
.card:hover img{transform:scale(1.07);filter:brightness(.48);}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55),rgba(0,0,0,.0)45%);display:flex;align-items:flex-end;padding:34px;z-index:2;}
.card h2{font-size:38px;font-weight:400;color:#f5efe4;margin-bottom:10px;}
.card span{font-family:Arial,sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#c9a96e;}
.empty{background:#111;border:1px solid rgba(201,169,110,.3);padding:45px;text-align:center;color:#bbb;font-family:Arial,sans-serif;}
.fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(rgba(0,0,0,.22),rgba(0,0,0,.88)),radial-gradient(circle at center,#3a2c16,#050505 70%);color:#c9a96e;font-size:28px;letter-spacing:4px;text-transform:uppercase;padding:30px;}
@media(max-width:700px){.header{flex-direction:column;align-items:flex-start;}.hero h1{font-size:40px;}.card{height:340px;}}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">Guest in Town</div>
<div class="nav">
<a href="../">Home</a>
<a href="villas.html">Destinazioni</a>
</div>
</div>

<section class="hero">
<h1 id="pageTitle">Destinazione</h1>
<p id="pageSubtitle">Scopra solo i paesi in cui Guest in Town dispone di ville selezionate.</p>
</section>

<div id="content" class="grid"></div>

</div>

<script>
const params=new URLSearchParams(window.location.search);
const destinationId=params.get('id');

loadDestination();

function normalizeName(name){
return (name||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function getImageByName(name){
const n=normalizeName(name);
if(n.includes('alberobello'))return 'https://loremflickr.com/1600/1100/alberobello,trulli,puglia?lock=301';
if(n.includes('ostuni'))return 'https://loremflickr.com/1600/1100/ostuni,puglia,white-town?lock=302';
if(n.includes('cisternino'))return 'https://loremflickr.com/1600/1100/cisternino,puglia?lock=303';
if(n.includes('carovigno'))return 'https://loremflickr.com/1600/1100/carovigno,puglia,ulivi?lock=304';
if(n.includes('francavilla'))return 'https://loremflickr.com/1600/1100/francavilla-fontana,puglia?lock=305';
if(n.includes('fasano'))return 'https://loremflickr.com/1600/1100/fasano,puglia,masseria?lock=306';
if(n.includes('bari'))return 'https://loremflickr.com/1600/1100/polignano-a-mare,puglia?lock=307';
if(n.includes('lecce'))return 'https://loremflickr.com/1600/1100/lecce,puglia,baroque?lock=308';
if(n.includes('otranto'))return 'https://loremflickr.com/1600/1100/otranto,salento,sea?lock=309';
if(n.includes('gallipoli'))return 'https://loremflickr.com/1600/1100/gallipoli,salento,sea?lock=310';
if(n.includes('monopoli'))return 'https://loremflickr.com/1600/1100/monopoli,puglia,mare?lock=312';
if(n.includes('polignano'))return 'https://loremflickr.com/1600/1100/polignano-a-mare,puglia?lock=313';
return 'https://loremflickr.com/1600/1100/puglia,ulivi,masseria?lock=311';
}

async function loadDestination(){
if(!destinationId){
showError('Destinazione non trovata.');
return;
}

const { data: destination, error } =
await supabaseClient
.from('destinations')
.select('*')
.eq('id',destinationId)
.single();

if(error || !destination){
showError('Destinazione non trovata.');
return;
}

document.getElementById('pageTitle').innerText=destination.name || 'Destinazione';

await loadTownsWithVillas();
}

async function townHasVillas(townId){
const { count, error } =
await supabaseClient
.from('villas')
.select('id',{count:'exact',head:true})
.eq('town_id',townId)
.or('status.eq.published,status.eq.approved,published.eq.true');

if(error){return false;}
return count > 0;
}

async function loadTownsWithVillas(){
const { data: towns, error } =
await supabaseClient
.from('towns')
.select('*')
.eq('destination_id',destinationId)
.order('name');

if(error){
showError(error.message);
return;
}

const content=document.getElementById('content');
content.innerHTML='';

let visibleCount=0;

for(const town of towns || []){
const hasVillas=await townHasVillas(town.id);

if(!hasVillas){
continue;
}

visibleCount++;

const imageUrl=town.image_url || getImageByName(town.name);

content.innerHTML+=`
<a class="card" href="town.html?id=${town.id}">
<div class="fallback">${town.name}</div>
<img src="${imageUrl}" alt="${town.name}" loading="lazy" onerror="this.style.display='none';">
<div class="card-overlay">
<div>
<h2>${town.name}</h2>
<span>Scopri le ville</span>
</div>
</div>
</a>`;
}

if(visibleCount===0){
showError('Nessun paese con ville disponibili in questa destinazione.');
}
}

function showError(message){
document.getElementById('content').innerHTML=`<div class="empty">${message}</div>`;
}
</script>

</body>
</html>
