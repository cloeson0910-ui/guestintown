<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa - Guest In Town</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f7f4ef;color:#111;}
.container{max-width:1200px;margin:auto;padding:30px;}
.hero{height:520px;background:#ddd;border-radius:18px;overflow:hidden;margin-bottom:30px;}
.hero img{width:100%;height:100%;object-fit:cover;}
h1{font-size:42px;margin-bottom:10px;}
.destination{font-size:18px;color:#777;margin-bottom:25px;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin:30px 0;}
.info-card,.section{background:white;padding:25px;border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.06);}
.section{margin-bottom:25px;}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;}
.gallery img{width:100%;height:220px;object-fit:cover;border-radius:14px;}
.services{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
.service{background:#f2eee7;padding:14px;border-radius:10px;}
.map-preview{height:350px;border-radius:16px;overflow:hidden;background:#ddd;cursor:pointer;}
.map-preview iframe{width:100%;height:100%;border:0;pointer-events:none;}
.button{display:inline-block;background:#111;color:white;padding:14px 22px;border-radius:8px;text-decoration:none;margin-top:15px;border:0;cursor:pointer;}
.button.secondary{background:#c9a96e;color:#111;margin-right:10px;}
.empty{padding:40px;text-align:center;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;}
input,textarea{width:100%;padding:13px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;}
textarea{min-height:100px;margin-top:15px;}
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:15px;}
.calendar-header button{background:#111;color:white;border:0;border-radius:8px;padding:12px 16px;cursor:pointer;}
.calendar-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:25px;}
.month h3{text-align:center;margin-bottom:15px;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.day-name{text-align:center;font-weight:bold;color:#777;font-size:13px;}
.day{background:#f2eee7;min-height:58px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
.day.empty-day{background:transparent;cursor:default;}
.day.booked{background:#c0392b;color:white;cursor:not-allowed;}
.day.selected{background:#111;color:white;}
.day.in-range{background:#c9a96e;color:#111;}
.day-price{font-size:11px;margin-top:4px;opacity:.8;}
.legend{display:flex;gap:15px;flex-wrap:wrap;margin-top:15px;color:#555;font-size:14px;}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.dot{width:14px;height:14px;border-radius:4px;background:#f2eee7;display:inline-block;}
.dot.booked{background:#c0392b;}
.dot.selected{background:#111;}
.selection-box{background:#f2eee7;padding:15px;border-radius:10px;margin-top:20px;line-height:1.7;}
.price-box{background:#111;color:white;padding:18px;border-radius:12px;margin-top:20px;line-height:1.8;}
.price-box strong{font-size:24px;}
.price-detail{font-size:14px;opacity:.9;margin-top:10px;}
</style>
</head>

<body>

<div class="container" id="page">
<div class="empty">Caricamento villa...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const villaId = params.get('id');

let selectedCheckIn = null;
let selectedCheckOut = null;
let currentBookings = [];
let currentVilla = null;
let currentRates = [];
let calendarBaseDate = new Date();

loadVillaPage();

function formatDateIT(dateString){
if(!dateString)return '-';
const parts = dateString.split('-');
return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

function formatEuro(value){
const number = Number(value || 0);
return number.toLocaleString('it-IT',{
style:'currency',
currency:'EUR'
});
}

function toISODate(date){
const y = date.getFullYear();
const m = String(date.getMonth()+1).padStart(2,'0');
const d = String(date.getDate()).padStart(2,'0');
return `${y}-${m}-${d}`;
}

function makeDate(y,m,d){
return new Date(y,m,d);
}

function dateDiffNights(start,end){
const startDate = new Date(start + 'T00:00:00');
const endDate = new Date(end + 'T00:00:00');
const diff = endDate - startDate;
return Math.round(diff / (1000 * 60 * 60 * 24));
}

function isBooked(dateString){
return currentBookings.some(b=>{
return dateString >= b.check_in && dateString < b.check_out;
});
}

function rangeHasBooked(start,end){
return currentBookings.some(b=>{
return start < b.check_out && end > b.check_in;
});
}

function getNightPrice(dateString){

const rate =
currentRates.find(r =>
dateString >= r.date_from &&
dateString <= r.date_to
);

if(rate){
return Number(rate.nightly_price || 0);
}

return Number(currentVilla?.nightly_price || 0);

}

function calculateStayTotal(start,end){

let total = 0;
let details = [];

let current =
new Date(start + 'T00:00:00');

const endDate =
new Date(end + 'T00:00:00');

while(current < endDate){

const iso =
toISODate(current);

const price =
getNightPrice(iso);

total += price;

details.push({
date:iso,
price:price
});

current.setDate(current.getDate()+1);

}

return {
total:total,
details:details
};

}

async function loadVillaPage(){

if(!villaId){
document.getElementById('page').innerHTML='<div class="empty">Villa non trovata.</div>';
return;
}

const { data: villa, error } =
await supabaseClient
.from('villas')
.select(`*,destinations(id,name)`)
.eq('id', villaId)
.single();

if(error || !villa){
document.getElementById('page').innerHTML='<div class="empty">Villa non trovata.</div>';
return;
}

currentVilla = villa;

const { data: images } =
await supabaseClient
.from('villa_images')
.select('*')
.eq('villa_id', villaId);

const { data: services } =
await supabaseClient
.from('villa_services')
.select('service_name')
.eq('villa_id', villaId);

const { data: bookings } =
await supabaseClient
.from('bookings')
.select('*')
.eq('villa_id', villaId)
.in('status',['pending','confirmed'])
.order('check_in');

const { data: rates } =
await supabaseClient
.from('villa_rates')
.select('*')
.eq('villa_id', villaId)
.order('date_from');

currentBookings = bookings || [];
currentRates = rates || [];

const mainImage =
images?.find(img => img.image_type === 'main')?.image_url
|| images?.[0]?.image_url
|| '';

renderVilla(villa, images || [], services || [], mainImage);

}

function renderVilla(villa, images, services, mainImage){

const lat = villa.latitude;
const lng = villa.longitude;

let mapHtml = '';

if(lat && lng){
const delta = 0.005;
const bbox = `${parseFloat(lng)-delta},${parseFloat(lat)-delta},${parseFloat(lng)+delta},${parseFloat(lat)+delta}`;

mapHtml = `
<div class="section">
<h2>Posizione</h2>
<div class="map-preview" onclick="openMap('${lat}','${lng}')">
<iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${lat},${lng}"></iframe>
</div>
<a class="button" target="_blank" href="https://www.google.com/maps?q=${lat},${lng}">Apri su Google Maps</a>
</div>`;
}

document.getElementById('page').innerHTML = `

<a class="button secondary" href="villas.html?destination_id=${villa.destination_id}">
← Torna alle ville della destinazione
</a>

<div class="hero">
${mainImage ? `<img src="${mainImage}">` : ''}
</div>

<h1>${villa.title || ''}</h1>
<div class="destination">${villa.destinations?.name || ''}</div>

<div class="info-grid">
<div class="info-card"><strong>Ospiti</strong><br>${villa.max_guests || '-'}</div>
<div class="info-card"><strong>Camere</strong><br>${villa.bedrooms || '-'}</div>
<div class="info-card"><strong>Bagni</strong><br>${villa.bathrooms || '-'}</div>
<div class="info-card"><strong>CIN</strong><br>${villa.cin || '-'}</div>
<div class="info-card"><strong>Prezzo da</strong><br>${villa.nightly_price ? formatEuro(villa.nightly_price) + ' / notte' : 'Su richiesta'}</div>
</div>

<div class="section">
<h2>Descrizione</h2>
<p>${villa.full_description || villa.short_description || 'Descrizione non ancora disponibile.'}</p>
</div>

<div class="section">
<h2>Gallery</h2>
<div class="gallery">
${images.map(img => `<img src="${img.image_url}">`).join('')}
</div>
</div>

<div class="section">
<h2>Servizi</h2>
<div class="services">
${services.map(service => `<div class="service">${service.service_name}</div>`).join('')}
</div>
</div>

<div class="section">
<h2>Disponibilità e tariffe</h2>

<div class="calendar-header">
<button onclick="changeMonth(-1)">← Mese precedente</button>
<button onclick="changeMonth(1)">Mese successivo →</button>
</div>

<div class="calendar-wrap" id="calendarWrap"></div>

<div class="legend">
<span><i class="dot"></i>Disponibile</span>
<span><i class="dot booked"></i>Occupata</span>
<span><i class="dot selected"></i>Selezionata</span>
</div>

<div class="selection-box" id="selectionBox">
Seleziona check-in e check-out dal calendario.
</div>
</div>

<div class="section">
<h2>Prenota questa villa</h2>

<div class="price-box" id="priceBox">
${villa.nightly_price ? `Prezzo base per notte: <strong>${formatEuro(villa.nightly_price)}</strong>` : 'Prezzo su richiesta'}
</div>

<div class="form-grid">
<input id="guests" type="number" placeholder="Numero ospiti">
<input id="guest_name" required placeholder="Nome e cognome *">
<input id="guest_email" required type="email" placeholder="Email *">
<input id="guest_phone" required placeholder="Telefono *">
</div>

<textarea id="notes" placeholder="Note o richieste speciali"></textarea>

<button class="button" onclick="submitBooking()">Invia richiesta di prenotazione</button>
</div>

${mapHtml}
`;

renderCalendars();
updateSelectionBox();

}

function changeMonth(direction){

calendarBaseDate =
new Date(
calendarBaseDate.getFullYear(),
calendarBaseDate.getMonth() + direction,
1
);

renderCalendars();

}

function renderCalendars(){

const wrap = document.getElementById('calendarWrap');
wrap.innerHTML = '';

renderMonth(calendarBaseDate.getFullYear(), calendarBaseDate.getMonth(), wrap);

const nextMonth = new Date(calendarBaseDate.getFullYear(), calendarBaseDate.getMonth()+1, 1);
renderMonth(nextMonth.getFullYear(), nextMonth.getMonth(), wrap);

}

function renderMonth(year,month,container){

const monthNames = [
'Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'
];

const firstDay = makeDate(year,month,1);
const lastDay = makeDate(year,month+1,0);

let html = `
<div class="month">
<h3>${monthNames[month]} ${year}</h3>
<div class="calendar">
<div class="day-name">L</div>
<div class="day-name">M</div>
<div class="day-name">M</div>
<div class="day-name">G</div>
<div class="day-name">V</div>
<div class="day-name">S</div>
<div class="day-name">D</div>
`;

let startOffset = firstDay.getDay();
startOffset = startOffset === 0 ? 6 : startOffset - 1;

for(let i=0;i<startOffset;i++){
html += `<div class="day empty-day"></div>`;
}

for(let d=1; d<=lastDay.getDate(); d++){

const date = makeDate(year,month,d);
const iso = toISODate(date);
const booked = isBooked(iso);
const price = getNightPrice(iso);

let classes = 'day';

if(booked) classes += ' booked';

if(selectedCheckIn === iso || selectedCheckOut === iso) classes += ' selected';

if(selectedCheckIn && selectedCheckOut && iso > selectedCheckIn && iso < selectedCheckOut){
classes += ' in-range';
}

const priceHtml =
price > 0
? `<div class="day-price">${formatEuro(price).replace(',00','')}</div>`
: `<div class="day-price">su richiesta</div>`;

html += `
<div class="${classes}" onclick="selectDate('${iso}', ${booked})">
<div>${d}</div>
${booked ? '<div class="day-price">occupata</div>' : priceHtml}
</div>
`;
}

html += `</div></div>`;

container.innerHTML += html;

}

function selectDate(iso,booked){

if(booked){
alert('Questa data risulta occupata.');
return;
}

if(!selectedCheckIn || selectedCheckOut){
selectedCheckIn = iso;
selectedCheckOut = null;
}

else if(iso <= selectedCheckIn){
selectedCheckIn = iso;
selectedCheckOut = null;
}

else{
if(rangeHasBooked(selectedCheckIn, iso)){
alert('Il periodo selezionato contiene date occupate.');
return;
}
selectedCheckOut = iso;
}

updateSelectionBox();
renderCalendars();

}

function updateSelectionBox(){

const box = document.getElementById('selectionBox');
const priceBox = document.getElementById('priceBox');

if(!box){
return;
}

if(selectedCheckIn && selectedCheckOut){

const nights = dateDiffNights(selectedCheckIn, selectedCheckOut);
const calculation = calculateStayTotal(selectedCheckIn, selectedCheckOut);
const total = calculation.total;

box.innerHTML = `
Check-in: <strong>${formatDateIT(selectedCheckIn)}</strong><br>
Check-out: <strong>${formatDateIT(selectedCheckOut)}</strong><br>
Notti: <strong>${nights}</strong>
`;

const detailHtml =
calculation.details.map(item=>{
return `${formatDateIT(item.date)}: ${item.price > 0 ? formatEuro(item.price) : 'su richiesta'}`;
}).join('<br>');

if(priceBox){
priceBox.innerHTML = total > 0
? `
Totale soggiorno: <strong>${formatEuro(total)}</strong>
<div class="price-detail">
${detailHtml}
</div>
`
: 'Prezzo su richiesta';
}

return;
}

if(selectedCheckIn){
box.innerHTML = `
Check-in: <strong>${formatDateIT(selectedCheckIn)}</strong><br>
Ora seleziona la data di check-out.
`;

if(priceBox){
const price = getNightPrice(selectedCheckIn);
priceBox.innerHTML = price > 0
? `Prezzo notte selezionata: <strong>${formatEuro(price)}</strong>`
: 'Prezzo su richiesta';
}

return;
}

box.innerHTML = 'Seleziona check-in e check-out dal calendario.';

if(priceBox){
priceBox.innerHTML = currentVilla?.nightly_price
? `Prezzo base per notte: <strong>${formatEuro(currentVilla.nightly_price)}</strong>`
: 'Prezzo su richiesta';
}

}

async function submitBooking(){

if(!selectedCheckIn || !selectedCheckOut){
alert('Seleziona check-in e check-out dal calendario.');
return;
}

const nights = dateDiffNights(selectedCheckIn, selectedCheckOut);
const calculation = calculateStayTotal(selectedCheckIn, selectedCheckOut);
const totalPrice = calculation.total > 0 ? calculation.total : null;

const booking = {
villa_id:villaId,
guest_name:document.getElementById('guest_name').value.trim(),
guest_email:document.getElementById('guest_email').value.trim(),
guest_phone:document.getElementById('guest_phone').value.trim(),
check_in:selectedCheckIn,
check_out:selectedCheckOut,
guests:document.getElementById('guests').value || null,
notes:document.getElementById('notes').value,
status:'pending',
source:'direct',
total_price:totalPrice
};

if(!booking.guest_name || !booking.guest_email || !booking.guest_phone){
alert('Compila nome, email e telefono.');
return;
}

if(nights <= 0){
alert('Seleziona date valide.');
return;
}

const { data: overlaps, error: overlapError } =
await supabaseClient
.from('bookings')
.select('*')
.eq('villa_id', villaId)
.in('status',['pending','confirmed'])
.lt('check_in', booking.check_out)
.gt('check_out', booking.check_in);

if(overlapError){
alert(overlapError.message);
return;
}

if(overlaps && overlaps.length > 0){
alert('Le date selezionate risultano già occupate.');
return;
}

const { error } =
await supabaseClient
.from('bookings')
.insert([booking]);

if(error){
alert(error.message);
return;
}

alert('Richiesta inviata. Riceverai conferma dalla società.');
window.location.reload();

}

function openMap(lat,lng){
window.open(`https://www.google.com/maps?q=${lat},${lng}`,'_blank');
}

</script>

</body>
</html>
