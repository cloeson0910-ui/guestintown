<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servizio Concierge - Guest in Town</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}body{background:#050505;color:#f5efe4;font-family:Arial,sans-serif;}.container{max-width:1300px;margin:auto;padding:40px 28px 90px;}.header{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:50px;}.logo{font-family:Georgia,"Times New Roman",serif;color:#c9a96e;font-size:26px;letter-spacing:4px;text-transform:uppercase;}.nav a{color:#c9a96e;border:1px solid rgba(201,169,110,.45);padding:12px 18px;text-decoration:none;text-transform:uppercase;font-size:12px;letter-spacing:1px;}.hero{text-align:center;margin-bottom:50px;}.hero h1{font-family:Georgia,"Times New Roman",serif;font-size:54px;color:#c9a96e;font-weight:400;margin-bottom:18px;}.hero p{color:#bbb;line-height:1.8;max-width:760px;margin:auto;}.provider{background:#0f0f0f;border:1px solid rgba(201,169,110,.25);margin-bottom:34px;display:grid;grid-template-columns:minmax(260px,360px) 1fr;gap:0;}.provider-photo{background:#111;min-height:430px;}.provider-photo img{width:100%;height:100%;object-fit:cover;display:block;}.provider-fallback{height:100%;display:flex;align-items:center;justify-content:center;color:#c9a96e;font-family:Georgia,"Times New Roman",serif;font-size:34px;text-align:center;padding:25px;}.provider-body{padding:28px;}.provider h2{font-family:Georgia,"Times New Roman",serif;font-size:38px;color:#f5efe4;font-weight:400;margin-bottom:10px;}.meta{color:#c9a96e;margin-bottom:18px;line-height:1.7;}.text{color:#bbb;line-height:1.8;margin-bottom:18px;}.curriculum{background:#151515;border:1px solid rgba(201,169,110,.18);padding:18px;margin:18px 0;color:#ddd;line-height:1.8;}.booking-box{background:#151515;border:1px solid rgba(201,169,110,.25);padding:20px;margin-top:22px;}.booking-box h3{font-family:Georgia,"Times New Roman",serif;color:#c9a96e;font-weight:400;font-size:28px;margin-bottom:14px;}.calendar-header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:18px 0;}.calendar-header button{background:transparent;color:#c9a96e;border:1px solid #c9a96e;padding:10px 14px;cursor:pointer;}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px;}.day-name{text-align:center;color:#777;font-weight:bold;font-size:12px;}.day{background:#1b1b1b;min-height:48px;display:flex;align-items:center;justify-content:center;border:1px solid #252525;cursor:pointer;color:#ddd;font-size:14px;}.day:hover{border-color:#c9a96e;}.day.empty{background:transparent;border:0;cursor:default;}.day.busy{background:#6f1d1b;color:white;cursor:not-allowed;}.day.too-soon{background:#252525;color:#666;cursor:not-allowed;}.day.selected{background:#c9a96e;color:#050505;}.legend{display:flex;gap:14px;flex-wrap:wrap;color:#aaa;font-size:13px;margin-bottom:18px;}.dot{display:inline-block;width:13px;height:13px;border:1px solid #333;background:#1b1b1b;margin-right:6px;vertical-align:-2px;}.dot.busy{background:#6f1d1b;}.dot.selected{background:#c9a96e;}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;}input,textarea{width:100%;background:#111;border:1px solid rgba(201,169,110,.25);padding:12px;color:white;margin-bottom:12px;}textarea{min-height:95px;}.button{background:#c9a96e;color:#050505;border:0;padding:13px 18px;font-weight:bold;text-transform:uppercase;cursor:pointer;}.status{background:#111;border:1px solid #333;padding:13px;line-height:1.6;color:#ccc;margin-top:12px;}.good{color:#2ecc71;font-weight:bold;}.bad{color:#e74c3c;font-weight:bold;}.empty-message{background:#0f0f0f;border:1px solid rgba(201,169,110,.25);padding:35px;text-align:center;color:#aaa;}@media(max-width:850px){.provider{grid-template-columns:1fr;}.provider-photo{height:320px;}.hero h1{font-size:40px;}}
</style>
</head>
<body>
<div class="container"><div class="header"><div class="logo">Guest Concierge</div><div class="nav"><a href="services.html">Servizi</a><a href="../">Home</a></div></div>
<section class="hero"><h1 id="serviceTitle">Servizio Concierge</h1><p id="serviceDescription">Caricamento servizio...</p></section><div id="providersList"></div></div>
<script>
const params = new URLSearchParams(window.location.search);const serviceId = params.get('id');const villaId = params.get('villa_id') || '';let selectedDates = {};let busyDaysByProvider = {};
loadServicePage();
function formatDateIT(dateString){if(!dateString)return '-';const p = dateString.split('-');return `${p[2]}/${p[1]}/${p[0]}`;}
function toISODate(date){const y=date.getFullYear();const m=String(date.getMonth()+1).padStart(2,'0');const d=String(date.getDate()).padStart(2,'0');return `${y}-${m}-${d}`;}
function minBookableISO(){const d=new Date();d.setDate(d.getDate()+1);return toISODate(d);}
async function loadServicePage(){if(!serviceId){document.getElementById('providersList').innerHTML='<div class="empty-message">Servizio non trovato.</div>';return;}const { data: service, error } = await supabaseClient.from('concierge_services').select('*').eq('id', serviceId).single();if(error || !service){document.getElementById('providersList').innerHTML='<div class="empty-message">Servizio non trovato.</div>';return;}document.getElementById('serviceTitle').innerText = service.name || 'Servizio Concierge';document.getElementById('serviceDescription').innerText = service.description || 'Servizio extra Guest in Town su richiesta.';const { data: providers, error: providersError } = await supabaseClient.from('concierge_providers').select('*').eq('service_id', serviceId).eq('active', true).order('sort_order');if(providersError){document.getElementById('providersList').innerHTML='<div class="empty-message">'+providersError.message+'</div>';return;}if(!providers || providers.length===0){document.getElementById('providersList').innerHTML='<div class="empty-message">Nessun professionista disponibile per questo servizio.</div>';return;}for(const provider of providers){await loadBusyDays(provider.id);}renderProviders(service, providers);}
async function loadBusyDays(providerId){const { data } = await supabaseClient.from('concierge_provider_busy_days').select('*').eq('provider_id', providerId);busyDaysByProvider[providerId]=(data || []).map(item=>item.requested_date);}
function renderProviders(service, providers){const list=document.getElementById('providersList');list.innerHTML='';providers.forEach(provider=>{const photo=provider.photo_url?`<img src="${provider.photo_url}" alt="${provider.name}">`:`<div class="provider-fallback">${provider.name || 'Professionista'}</div>`;list.innerHTML+=`<div class="provider"><div class="provider-photo">${photo}</div><div class="provider-body"><h2>${provider.name || ''}</h2><div class="meta">${provider.coverage_area ? `<strong>Zona:</strong> ${provider.coverage_area}<br>` : ''}${provider.languages ? `<strong>Lingue:</strong> ${provider.languages}<br>` : ''}${provider.price_note ? `<strong>Tariffe:</strong> ${provider.price_note}` : ''}</div><div class="text">${provider.bio || 'Professionista selezionato da Guest in Town.'}</div>${provider.curriculum ? `<div class="curriculum"><strong>Curriculum</strong><br>${provider.curriculum}</div>` : ''}<div class="booking-box"><h3>Richiedi disponibilità</h3><p class="text">Seleziona una data disponibile. Il servizio è prenotabile con almeno 24 ore di preavviso.</p><div class="calendar-header"><button onclick="changeProviderMonth(${provider.id},-1)">← Mese precedente</button><strong id="monthLabel-${provider.id}"></strong><button onclick="changeProviderMonth(${provider.id},1)">Mese successivo →</button></div><div class="calendar" id="calendar-${provider.id}"></div><div class="legend"><span><i class="dot"></i>Disponibile</span><span><i class="dot busy"></i>Impegnato</span><span><i class="dot selected"></i>Selezionato</span></div><div class="form-grid"><input id="guest_name-${provider.id}" placeholder="Nome e cognome *"><input id="guest_email-${provider.id}" type="email" placeholder="Email *"><input id="guest_phone-${provider.id}" placeholder="Telefono"><input id="requested_time-${provider.id}" placeholder="Orario desiderato"><input id="guests-${provider.id}" type="number" min="1" placeholder="Numero ospiti"></div><textarea id="notes-${provider.id}" placeholder="Note o richieste particolari"></textarea><button class="button" onclick="submitServiceRequest(${service.id},${provider.id})">Invia richiesta a Guest in Town</button><div class="status" id="status-${provider.id}">Nessuna richiesta inviata.</div></div></div></div>`;renderProviderCalendar(provider.id);});}
function changeProviderMonth(providerId,direction){const key=`baseDate_${providerId}`;if(!window[key]) window[key]=new Date();window[key]=new Date(window[key].getFullYear(),window[key].getMonth()+direction,1);renderProviderCalendar(providerId);}
function renderProviderCalendar(providerId){const key=`baseDate_${providerId}`;if(!window[key]) window[key]=new Date();const date=window[key];const year=date.getFullYear();const month=date.getMonth();const monthNames=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];document.getElementById(`monthLabel-${providerId}`).innerText=`${monthNames[month]} ${year}`;const firstDay=new Date(year,month,1);const lastDay=new Date(year,month+1,0);let startOffset=firstDay.getDay();startOffset=startOffset===0?6:startOffset-1;let html=`<div class="day-name">L</div><div class="day-name">M</div><div class="day-name">M</div><div class="day-name">G</div><div class="day-name">V</div><div class="day-name">S</div><div class="day-name">D</div>`;for(let i=0;i<startOffset;i++){html+=`<div class="day empty"></div>`;}const minDate=minBookableISO();const busy=busyDaysByProvider[providerId] || [];const selected=selectedDates[providerId];for(let d=1;d<=lastDay.getDate();d++){const iso=toISODate(new Date(year,month,d));let classes='day';let onclick=`onclick="selectProviderDate(${providerId},'${iso}')"`;if(iso < minDate){classes+=' too-soon';onclick='';}if(busy.includes(iso)){classes+=' busy';onclick='';}if(selected===iso){classes+=' selected';}html+=`<div class="${classes}" ${onclick}>${d}</div>`;}document.getElementById(`calendar-${providerId}`).innerHTML=html;}
function selectProviderDate(providerId,iso){selectedDates[providerId]=iso;renderProviderCalendar(providerId);document.getElementById(`status-${providerId}`).innerHTML=`Data selezionata: <span class="good">${formatDateIT(iso)}</span>`;}
async function submitServiceRequest(serviceId,providerId){const status=document.getElementById(`status-${providerId}`);const requestedDate=selectedDates[providerId];if(!requestedDate){status.innerHTML='<span class="bad">Seleziona una data disponibile.</span>';return;}const body={service_id:serviceId,provider_id:providerId,villa_id:villaId || null,requested_date:requestedDate,requested_time:document.getElementById(`requested_time-${providerId}`).value,guest_name:document.getElementById(`guest_name-${providerId}`).value.trim(),guest_email:document.getElementById(`guest_email-${providerId}`).value.trim(),guest_phone:document.getElementById(`guest_phone-${providerId}`).value.trim(),guests:document.getElementById(`guests-${providerId}`).value || null,notes:document.getElementById(`notes-${providerId}`).value};if(!body.guest_name || !body.guest_email){status.innerHTML='<span class="bad">Inserisci nome ed email.</span>';return;}status.innerHTML='Invio richiesta in corso...';const { data, error }=await supabaseClient.functions.invoke('request-concierge-service',{ body });if(error){status.innerHTML='<span class="bad">'+error.message+'</span>';return;}if(!data || data.success===false){status.innerHTML='<span class="bad">'+(data?.error || 'Errore invio richiesta')+'</span>';return;}status.innerHTML='<span class="good">Richiesta inviata. Guest in Town ti contatterà per confermare il servizio.</span>';await loadBusyDays(providerId);renderProviderCalendar(providerId);}
</script>
</body>
</html>
