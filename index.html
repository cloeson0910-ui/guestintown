<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guest in Town - Vacanze di lusso in Salento</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

.hero{
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.75)),
url("https://images.unsplash.com/photo-1622550428746-8f1f20f4f5f9?auto=format&fit=crop&w=1800&q=80");
background-size:cover;
background-position:center;
padding:30px;
display:flex;
align-items:center;
justify-content:center;
}

.container{
max-width:1100px;
width:100%;
}

.logo{
font-size:22px;
letter-spacing:2px;
text-transform:uppercase;
margin-bottom:80px;
}

h1{
font-size:62px;
line-height:1.05;
margin-bottom:20px;
}

.subtitle{
font-size:26px;
color:#f2eee7;
margin-bottom:35px;
}

.panel{
background:rgba(255,255,255,.96);
color:#111;
border-radius:22px;
padding:25px;
box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:15px;
}

.calendar-header button{
background:#111;
color:white;
border:0;
border-radius:8px;
padding:12px 16px;
cursor:pointer;
}

.calendar-wrap{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.month h3{
text-align:center;
margin-bottom:15px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day-name{
text-align:center;
font-weight:bold;
color:#777;
font-size:13px;
}

.day{
background:#f2eee7;
min-height:46px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.day.empty-day{
background:transparent;
cursor:default;
}

.day.selected{
background:#111;
color:white;
}

.day.in-range{
background:#c9a96e;
color:#111;
}

.search-bottom{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:25px;
align-items:end;
}

.field{
background:#f7f4ef;
padding:14px;
border-radius:10px;
}

.field label{
display:block;
font-size:12px;
font-weight:bold;
color:#555;
margin-bottom:6px;
}

.field div{
font-size:18px;
font-weight:bold;
}

input{
width:100%;
padding:13px;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
}

button.search{
background:#c9a96e;
color:#111;
border:0;
padding:16px 22px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
height:100%;
}

.actions{
margin-top:25px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.actions a{
background:white;
color:#111;
padding:14px 22px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.actions a.gold{
background:#c9a96e;
}

@media(max-width:700px){
h1{
font-size:42px;
}

.subtitle{
font-size:20px;
}

.logo{
margin-bottom:40px;
}
}
</style>
</head>

<body>

<div class="hero">

<div class="container">

<div class="logo">Guest in Town</div>

<h1>Le sue vacanze di lusso in Salento</h1>

<div class="subtitle">
Ville esclusive, soggiorni privati e ospitalità su misura in Puglia.
</div>

<div class="panel">

<div class="calendar-header">
<button onclick="changeMonth(-1)">← Mese precedente</button>
<button onclick="changeMonth(1)">Mese successivo →</button>
</div>

<div class="calendar-wrap" id="calendarWrap"></div>

<div class="search-bottom">

<div class="field">
<label>Check-in</label>
<div id="checkInLabel">Seleziona</div>
</div>

<div class="field">
<label>Check-out</label>
<div id="checkOutLabel">Seleziona</div>
</div>

<div>
<input id="guests" type="number" min="1" placeholder="Numero ospiti">
</div>

<button class="search" onclick="searchVillas()">
Cerca ville disponibili
</button>

</div>

</div>

<div class="actions">
<a class="gold" href="public/villas.html">Esplora tutte le ville</a>
<a href="public/villas.html">Scopri le destinazioni</a>
<a href="./">Home</a>
</div>

</div>

</div>

<script>

let selectedCheckIn = null;
let selectedCheckOut = null;
let calendarBaseDate = new Date();

renderCalendars();

function formatDateIT(dateString){

if(!dateString){
return 'Seleziona';
}

const parts =
dateString.split('-');

return `${parts[2]}/${parts[1]}/${parts[0]}`;

}

function toISODate(date){

const y =
date.getFullYear();

const m =
String(date.getMonth()+1).padStart(2,'0');

const d =
String(date.getDate()).padStart(2,'0');

return `${y}-${m}-${d}`;

}

function makeDate(y,m,d){

return new Date(y,m,d);

}

function changeMonth(direction){

calendarBaseDate =
new Date(
calendarBaseDate.getFullYear(),
calendarBaseDate.getMonth() + direction,
1
);

renderCalendars();

}

function renderCalendars(){

const wrap =
document.getElementById('calendarWrap');

wrap.innerHTML = '';

renderMonth(
calendarBaseDate.getFullYear(),
calendarBaseDate.getMonth(),
wrap
);

const nextMonth =
new Date(
calendarBaseDate.getFullYear(),
calendarBaseDate.getMonth()+1,
1
);

renderMonth(
nextMonth.getFullYear(),
nextMonth.getMonth(),
wrap
);

}

function renderMonth(year,month,container){

const monthNames = [
'Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'
];

const firstDay =
makeDate(year,month,1);

const lastDay =
makeDate(year,month+1,0);

let html = `
<div class="month">
<h3>${monthNames[month]} ${year}</h3>
<div class="calendar">
<div class="day-name">L</div>
<div class="day-name">M</div>
<div class="day-name">M</div>
<div class="day-name">G</div>
<div class="day-name">V</div>
<div class="day-name">S</div>
<div class="day-name">D</div>
`;

let startOffset =
firstDay.getDay();

startOffset =
startOffset === 0 ? 6 : startOffset - 1;

for(let i=0;i<startOffset;i++){
html += `<div class="day empty-day"></div>`;
}

for(let d=1; d<=lastDay.getDate(); d++){

const date =
makeDate(year,month,d);

const iso =
toISODate(date);

let classes =
'day';

if(selectedCheckIn === iso || selectedCheckOut === iso){
classes += ' selected';
}

if(
selectedCheckIn &&
selectedCheckOut &&
iso > selectedCheckIn &&
iso < selectedCheckOut
){
classes += ' in-range';
}

html += `
<div class="${classes}" onclick="selectDate('${iso}')">
${d}
</div>
`;

}

html += `
</div>
</div>
`;

container.innerHTML += html;

}

function selectDate(iso){

if(!selectedCheckIn || selectedCheckOut){
selectedCheckIn = iso;
selectedCheckOut = null;
}

else if(iso <= selectedCheckIn){
selectedCheckIn = iso;
selectedCheckOut = null;
}

else{
selectedCheckOut = iso;
}

document.getElementById('checkInLabel').innerText =
formatDateIT(selectedCheckIn);

document.getElementById('checkOutLabel').innerText =
formatDateIT(selectedCheckOut);

renderCalendars();

}

function searchVillas(){

const guests =
document.getElementById('guests').value;

if(!selectedCheckIn || !selectedCheckOut){
alert('Seleziona check-in e check-out.');
return;
}

let url =
`public/villas.html?check_in=${selectedCheckIn}&check_out=${selectedCheckOut}`;

if(guests){
url += `&guests=${guests}`;
}

window.location.href =
url;

}

</script>

</body>
</html>
