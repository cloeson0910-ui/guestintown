<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Dimora | Guest in Town</title>
    <!-- Include i file necessari -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Stile base mantenuto */
        :root { --bg-dark: #141312; --bg-card: #1C1A18; --color-gold: #E5D0B3; --color-subtitle: #9E958A; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Montserrat', sans-serif; }
        .booking-box { background-color: var(--bg-card); padding: 30px; border: 1px solid rgba(229, 208, 179, 0.15); }
        .btn-confirm { display: block; width: 100%; padding: 14px; background-color: var(--color-gold); color: var(--bg-dark); border: none; cursor: pointer; text-transform: uppercase; font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="booking-column">
        <div class="booking-box">
            <!-- Form collegato a Web3Forms -->
            <form action="https://api.web3forms.com/submit" method="POST" id="bookingForm">
                
                <!-- Access Key inserita correttamente -->
                <input type="hidden" name="access_key" value="50c9eae1-0ff1-48de-bedc-7f93db9bf087">
                <input type="hidden" name="subject" value="Nuova Prenotazione - Guest in Town">
                
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" name="name" id="client-name" required style="width: 100%; padding: 10px;">
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <label>Indirizzo Email</label>
                    <input type="email" name="email" id="client-email" required style="width: 100%; padding: 10px;">
                </div>

                <button type="submit" class="btn-confirm">Conferma Prenotazione</button>
            </form>
        </div>
    </div>

    <script>
        // Gestione del form dopo l'invio
        const form = document.getElementById('bookingForm');
        form.addEventListener('submit', function(e) {
            // Qui puoi mantenere la logica per il PDF se vuoi che si scarichi subito
            alert("Prenotazione inviata con successo! Riceverai una conferma via email.");
        });
    </script>
</body>
</html>
