        .amenity-sub { font-size: 0.7rem; color: var(--color-subtitle); margin-top: 4px; }

        .price-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--color-subtitle); text-align: center; margin-bottom: 25px; }
