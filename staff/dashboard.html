<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Dashboard - Guest in Town</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#050505">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<style>
*{box-sizing:border-box;}
body{margin:0;background:#050505;color:#f5efe4;font-family:Arial,sans-serif;}
.container{max-width:900px;margin:auto;padding:22px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:12px;flex-wrap:wrap;}
.logo{font-family:Georgia,"Times New Roman",serif;color:#c9a96e;font-size:23px;letter-spacing:3px;text-transform:uppercase;}
button,a.btn{background:#151515;color:#c9a96e;border:1px solid rgba(201,169,110,.35);padding:10px 12px;text-decoration:none;border-radius:6px;cursor:pointer;}
.logout{background:#6f1d1b!important;color:white!important;border-color:#6f1d1b!important;}
h1{font-family:Georgia,"Times New Roman",serif;color:#c9a96e;font-weight:400;margin:0 0 8px;}
.subtitle{color:#aaa;line-height:1.6;margin-bottom:22px;}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:#0f0f0f;border:1px solid rgba(201,169,110,.25);padding:15px;border-radius:10px;}
.kpi .label{font-size:12px;color:#aaa;text-transform:uppercase;}
.kpi .value{font-size:28px;font-weight:bold;margin-top:8px;}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.tabs button.active{background:#c9a96e;color:#050505;}
.task{background:#0f0f0f;border:1px solid rgba(201,169,110,.25);border-radius:12px;padding:17px;margin-bottom:13px;}
.task h2{font-family:Georgia,"Times New Roman",serif;font-weight:400;color:#f5efe4;margin:0 0 8px;}
.meta{color:#bbb;line-height:1.7;font-size:14px;}
.badge{display:inline-block;padding:5px 8px;border-radius:20px;font-size:12px;margin-bottom:8px;}
.todo{background:#5f4b28;color:#fff0c2;}
.in_progress{background:#1f4b5f;color:#dff4ff;}
.completed{background:#1f5f3a;color:#dfffea;}
.verified{background:#4d3c82;color:#eee6ff;}
.actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;}
.open{background:#c9a96e!important;color:#050505!important;border:0!important;font-weight:bold;}
.status{background:#151515;border:1px solid #333;padding:12px;color:#ccc;border-radius:8px;line-height:1.6;margin-bottom:15px;}
.good{color:#2ecc71;font-weight:bold;}
.bad{color:#e74c3c;font-weight:bold;}
.warn{color:#f1c40f;font-weight:bold;}
@media(max-width:600px){.kpis{grid-template-columns:1fr;}.header{align-items:flex-start;flex-direction:column;}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo">Guest Staff</div>
<div>
<a class="btn" href="dashboard.html">Aggiorna</a>
<button class="btn" onclick="enablePushNotifications()">Attiva notifiche</button>
<button class="logout" onclick="logout()">Logout</button>
</div>
</div>

<h1>Le tue attività</h1>
<div class="subtitle" id="staffInfo">Caricamento incarichi...</div>
<div id="pushStatus" class="status">Notifiche non ancora attivate su questo dispositivo.</div>

<div class="kpis">
<div class="kpi"><div class="label">Da fare</div><div class="value" id="todoCount">0</div></div>
<div class="kpi"><div class="label">In corso</div><div class="value" id="progressCount">0</div></div>
<div class="kpi"><div class="label">Completate</div><div class="value" id="completedCount">0</div></div>
</div>

<div class="tabs">
<button class="active" onclick="setFilter('upcoming',this)">Prossime</button>
<button onclick="setFilter('today',this)">Oggi</button>
<button onclick="setFilter('tomorrow',this)">Domani</button>
<button onclick="setFilter('all',this)">Tutte</button>
</div>

<div id="tasksList" class="status">Caricamento...</div>
</div>

<script>
let currentUser = null;
let staffMember = null;
let tasks = [];
let currentFilter = 'upcoming';
let swRegistration = null;

checkAuth();
registerStaffServiceWorker();

async function registerStaffServiceWorker(){
const pushBox = document.getElementById('pushStatus');

try{
if(!('serviceWorker' in navigator)){
pushBox.innerHTML = '<span class="bad">Service worker non supportato da questo browser.</span>';
return;
}

swRegistration = await navigator.serviceWorker.register('./service-worker.js', {
scope:'./'
});

await swRegistration.update();

pushBox.innerHTML = '<span class="good">Staff App pronta. Puoi attivare le notifiche.</span>';

}catch(err){
pushBox.innerHTML = '<span class="bad">Errore registrazione app: '+err.message+'</span>';
}
}

async function checkAuth(){
const { data } = await supabaseClient.auth.getUser();

if(!data.user){
window.location.href = 'login.html';
return;
}

currentUser = data.user;
await loadStaffMember();
await loadTasks();
}

async function loadStaffMember(){
const { data, error } = await supabaseClient
.from('staff_members')
.select('*')
.ilike('email', currentUser.email)
.eq('active', true)
.maybeSingle();

if(error){
document.getElementById('staffInfo').innerHTML = '<span class="bad">Errore profilo staff: '+error.message+'</span>';
return;
}

if(!data){
document.getElementById('staffInfo').innerHTML =
'<span class="bad">Nessun collaboratore attivo trovato per questa email:</span><br>' +
currentUser.email +
'<br><br>Controlla che in admin/operations.html il collaboratore abbia esattamente questa email e sia attivo.';
return;
}

staffMember = data;
document.getElementById('staffInfo').innerHTML =
`${staffMember.full_name} · ${roleLabel(staffMember.role)}<br><span style="color:#777">Email: ${staffMember.email}</span>`;
}

async function loadTasks(){
if(!staffMember){
document.getElementById('tasksList').innerHTML = 'Nessun profilo staff attivo.';
return;
}

const { data, error } = await supabaseClient
.from('staff_tasks')
.select('*, villas(title)')
.eq('staff_id', staffMember.id)
.order('task_date',{ascending:true});

if(error){
document.getElementById('tasksList').innerHTML = '<span class="bad">'+error.message+'</span>';
return;
}

tasks = data || [];
renderTasks();
}

function setFilter(filter, btn){
currentFilter = filter;
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
renderTasks();
}

function todayISO(offset=0){
const d = new Date();
d.setDate(d.getDate()+offset);
const y=d.getFullYear();
const m=String(d.getMonth()+1).padStart(2,'0');
const day=String(d.getDate()).padStart(2,'0');
return `${y}-${m}-${day}`;
}

function formatDate(dateString){
if(!dateString)return '-';
const p=dateString.split('-');
return `${p[2]}/${p[1]}/${p[0]}`;
}

function renderTasks(){
let filtered = tasks;
const today = todayISO();

if(currentFilter === 'upcoming'){
filtered = tasks.filter(t=>t.task_date >= today && !['verified'].includes(t.status));
}

if(currentFilter === 'today'){
filtered = tasks.filter(t=>t.task_date === todayISO());
}

if(currentFilter === 'tomorrow'){
filtered = tasks.filter(t=>t.task_date === todayISO(1));
}

document.getElementById('todoCount').innerText = filtered.filter(t=>t.status === 'todo').length;
document.getElementById('progressCount').innerText = filtered.filter(t=>t.status === 'in_progress').length;
document.getElementById('completedCount').innerText = filtered.filter(t=>['completed','verified'].includes(t.status)).length;

const list = document.getElementById('tasksList');

if(tasks.length === 0){
list.className = 'status';
list.innerHTML =
'<span class="warn">Nessuna attività assegnata a questo collaboratore.</span><br><br>' +
'Da admin/operations.html devi assegnare la villa al collaboratore e cliccare “Genera attività da prenotazioni”, oppure creare una nuova attività manuale.';
return;
}

if(filtered.length === 0){
list.className = 'status';
list.innerHTML =
'Nessuna attività trovata per questo filtro.<br>' +
'Attività totali assegnate a questo collaboratore: <strong>'+tasks.length+'</strong>. Prova il filtro “Tutte”.';
return;
}

list.className = '';
list.innerHTML = '';

filtered.forEach(task=>{
list.innerHTML += `
<div class="task">
<span class="badge ${task.status}">${statusLabel(task.status)}</span>
<h2>${task.title || ''}</h2>
<div class="meta">
<strong>Tipo:</strong> ${typeLabel(task.task_type)}<br>
<strong>Villa:</strong> ${task.villas?.title || '-'}<br>
<strong>Data:</strong> ${formatDate(task.task_date)} ${task.task_time || ''}<br>
${task.guest_name ? `<strong>Ospite:</strong> ${task.guest_name}<br>` : ''}
${task.notes ? `<strong>Note:</strong> ${task.notes}` : ''}
</div>
<div class="actions">
<a class="btn open" href="task.html?id=${task.id}">Apri attività</a>
</div>
</div>
`;
});
}

async function enablePushNotifications(){
const pushBox = document.getElementById('pushStatus');

try{
pushBox.innerHTML = 'Avvio attivazione notifiche...';

if(!staffMember){
pushBox.innerHTML = '<span class="bad">Profilo staff non caricato.</span>';
return;
}

if(!('serviceWorker' in navigator)){
pushBox.innerHTML = '<span class="bad">Questo browser non supporta i service worker.</span>';
return;
}

if(!('PushManager' in window)){
pushBox.innerHTML = '<span class="bad">Questo dispositivo/browser non supporta le notifiche push PWA.</span>';
return;
}

if(typeof Notification === 'undefined'){
pushBox.innerHTML = '<span class="bad">Notification API non disponibile su questo dispositivo.</span>';
return;
}

pushBox.innerHTML = 'Richiesta autorizzazione notifiche...';
const permission = await Notification.requestPermission();

if(permission !== 'granted'){
pushBox.innerHTML = '<span class="bad">Notifiche non autorizzate. Stato: '+permission+'</span>';
return;
}

pushBox.innerHTML = 'Registro Staff App...';

if(!swRegistration){
swRegistration = await navigator.serviceWorker.register('./service-worker.js', {
scope:'./'
});
await swRegistration.update();
}

pushBox.innerHTML = 'Lettura chiave pubblica notifiche...';

const { data, error } = await supabaseClient.functions.invoke(
'staff-push-config',
{ body:{} }
);

if(error){
pushBox.innerHTML = '<span class="bad">Errore staff-push-config: '+error.message+'</span>';
return;
}

if(!data || !data.publicKey){
pushBox.innerHTML = '<span class="bad">Chiave pubblica VAPID mancante.</span>';
return;
}

pushBox.innerHTML = 'Creazione sottoscrizione push...';

let subscription = await swRegistration.pushManager.getSubscription();

if(!subscription){
subscription = await swRegistration.pushManager.subscribe({
userVisibleOnly:true,
applicationServerKey:urlBase64ToUint8Array(data.publicKey)
});
}

if(!subscription){
pushBox.innerHTML = '<span class="bad">Sottoscrizione push non creata.</span>';
return;
}

const json = subscription.toJSON();

if(!json.keys || !json.keys.p256dh || !json.keys.auth){
pushBox.innerHTML = '<span class="bad">Chiavi subscription mancanti.</span>';
return;
}

pushBox.innerHTML = 'Salvataggio telefono in Supabase...';

const { error: saveError } = await supabaseClient
.from('staff_push_subscriptions')
.upsert([{
staff_id:staffMember.id,
endpoint:subscription.endpoint,
p256dh:json.keys.p256dh,
auth:json.keys.auth,
user_agent:navigator.userAgent,
active:true,
updated_at:new Date().toISOString()
}],{onConflict:'endpoint'});

if(saveError){
pushBox.innerHTML = '<span class="bad">Errore salvataggio notifiche: '+saveError.message+'</span>';
return;
}

pushBox.innerHTML = '<span class="good">Notifiche attivate su questo dispositivo.</span>';

}catch(err){
pushBox.innerHTML = '<span class="bad">Errore notifiche: '+err.message+'</span>';
}
}

function urlBase64ToUint8Array(base64String){
const padding = '='.repeat((4 - base64String.length % 4) % 4);
const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
const rawData = window.atob(base64);
const outputArray = new Uint8Array(rawData.length);

for(let i=0;i<rawData.length;++i){
outputArray[i] = rawData.charCodeAt(i);
}

return outputArray;
}

function statusLabel(status){
const labels = {todo:'Da fare',in_progress:'In corso',completed:'Completata',verified:'Verificata'};
return labels[status] || status;
}

function typeLabel(type){
const labels = {cleaning:'Pulizia',checkin:'Check-in',checkout:'Check-out',maintenance:'Manutenzione',concierge:'Concierge'};
return labels[type] || type;
}

function roleLabel(role){
const labels = {cleaning:'Pulizie',checkin:'Check-in',checkout:'Check-out',manager:'Manager',concierge:'Concierge'};
return labels[role] || role || '-';
}

async function logout(){
await supabaseClient.auth.signOut();
window.location.href = 'login.html';
}
</script>
</body>
</html>
