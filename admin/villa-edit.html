<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modifica Villa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
padding:30px;
max-width:900px;
margin:auto;
}

.menu{
display:flex;
gap:15px;
align-items:center;
margin-bottom:30px;
}

.menu a,
.menu button{
background:#222;
color:white;
padding:10px 15px;
text-decoration:none;
border:0;
border-radius:6px;
cursor:pointer;
}

.menu .logout{
margin-left:auto;
background:#c0392b;
}

h1{
margin-bottom:20px;
}

.section{
background:#1b1b1b;
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

.section h2{
font-size:20px;
margin-bottom:15px;
}

input,
select,
textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
}

textarea{
min-height:120px;
}

.gps-actions{
display:flex;
gap:10px;
margin-bottom:15px;
}

.gps-actions button{
flex:1;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.gps-button{
background:#c9a96e;
color:black;
font-weight:bold;
}

.map-button{
background:#333;
color:white;
}

.map-preview{
width:100%;
height:260px;
border-radius:10px;
overflow:hidden;
background:#222;
margin-bottom:15px;
cursor:pointer;
border:1px solid #333;
}

.map-preview iframe{
width:100%;
height:100%;
border:0;
pointer-events:none;
}

.map-empty{
height:260px;
display:flex;
align-items:center;
justify-content:center;
color:#aaa;
}

.photo-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:15px;
}

.photo-box{
background:#151515;
border:2px dashed #555;
border-radius:10px;
padding:10px;
text-align:center;
}

.photo-box img{
width:100%;
height:130px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
display:none;
}

.photo-box label{
display:block;
font-size:14px;
margin-bottom:10px;
color:#ccc;
}

.photo-box input{
font-size:12px;
}

.actions{
display:flex;
gap:10px;
margin-top:20px;
}

button.save{
background:#c9a96e;
color:black;
font-weight:bold;
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

button.cancel{
background:#333;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

button.delete-photo{
background:#c0392b;
color:white;
border:none;
padding:8px 10px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}
</style>
</head>

<body>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="villas.html">Ville</a>
<a href="villa-form.html">Nuova Villa</a>
<a href="destinations.html">Destinazioni</a>
<button onclick="logout()" class="logout">Logout</button>
</div>

<h1>Modifica Villa</h1>

<div class="section">
<h2>Dati principali</h2>

<input id="title" placeholder="Nome Villa">
<input id="cin" placeholder="CIN">

<label>Destinazione</label>
<select id="destination_id">
<option value="">Seleziona destinazione</option>
</select>

<input id="owner_name" placeholder="Nome Proprietario">
<input id="owner_phone" placeholder="Telefono Proprietario">
<input id="owner_email" placeholder="Email Proprietario">

<label>Stato</label>
<select id="status">
<option value="standby">Standby</option>
<option value="in_review">In revisione</option>
<option value="approved">Approvata</option>
<option value="published">Pubblicata</option>
<option value="rejected">Rifiutata</option>
</select>
</div>

<div class="section">
<h2>Dati immobile</h2>

<input id="address" placeholder="Indirizzo">

<div class="gps-actions">
<button class="gps-button" onclick="detectLocation()">📍 Rileva posizione GPS</button>
<button class="map-button" onclick="openMap()">Apri su Google Maps</button>
</div>

<input id="latitude" type="number" step="any" placeholder="Latitudine">
<input id="longitude" type="number" step="any" placeholder="Longitudine">

<div class="map-preview" onclick="openMap()">
<div id="mapEmpty" class="map-empty">Nessuna posizione rilevata</div>
<iframe id="mapFrame" style="display:none;"></iframe>
</div>

<input id="bedrooms" type="number" placeholder="Camere">
<input id="bathrooms" type="number" placeholder="Bagni">
<input id="max_guests" type="number" placeholder="Ospiti massimi">

<input id="cadastral_sheet" placeholder="Foglio catastale">
<input id="cadastral_parcel" placeholder="Particella / Mappale">
<input id="cadastral_subunit" placeholder="Subalterno">

<textarea id="short_description" placeholder="Descrizione breve"></textarea>
<textarea id="full_description" placeholder="Descrizione completa"></textarea>
</div>

<div class="section">
<h2>Foto villa</h2>

<div class="photo-grid">

<div class="photo-box">
<label>Foto principale</label>
<img id="preview-main">
<input type="file" accept="image/*" onchange="uploadImage(event,'main','preview-main')">
<button class="delete-photo" onclick="deleteImage('main','preview-main')">Elimina</button>
</div>

<div class="photo-box">
<label>Foto esterno</label>
<img id="preview-exterior">
<input type="file" accept="image/*" onchange="uploadImage(event,'exterior','preview-exterior')">
<button class="delete-photo" onclick="deleteImage('exterior','preview-exterior')">Elimina</button>
</div>

<div class="photo-box">
<label>Foto soggiorno</label>
<img id="preview-living">
<input type="file" accept="image/*" onchange="uploadImage(event,'living','preview-living')">
<button class="delete-photo" onclick="deleteImage('living','preview-living')">Elimina</button>
</div>

<div class="photo-box">
<label>Foto camera</label>
<img id="preview-bedroom">
<input type="file" accept="image/*" onchange="uploadImage(event,'bedroom','preview-bedroom')">
<button class="delete-photo" onclick="deleteImage('bedroom','preview-bedroom')">Elimina</button>
</div>

<div class="photo-box">
<label>Foto bagno</label>
<img id="preview-bathroom">
<input type="file" accept="image/*" onchange="uploadImage(event,'bathroom','preview-bathroom')">
<button class="delete-photo" onclick="deleteImage('bathroom','preview-bathroom')">Elimina</button>
</div>

<div class="photo-box">
<label>Foto piscina / giardino</label>
<img id="preview-pool">
<input type="file" accept="image/*" onchange="uploadImage(event,'pool','preview-pool')">
<button class="delete-photo" onclick="deleteImage('pool','preview-pool')">Elimina</button>
</div>

</div>
</div>

<div class="actions">
<button class="save" onclick="updateVilla()">Salva modifiche</button>
<button class="cancel" onclick="cancelEdit()">Annulla modifiche</button>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const villaId = params.get('id');

checkAuth();

async function checkAuth(){

const { data } = await supabaseClient.auth.getUser();

if(!data.user){
window.location.href = "login.html";
return;
}

await loadDestinations();
await loadVilla();
await loadImages();

}

async function loadDestinations(){

const { data, error } =
await supabaseClient
.from('destinations')
.select('id,name')
.order('name');

if(error){
alert(error.message);
return;
}

const select = document.getElementById('destination_id');

data.forEach(destination=>{

select.innerHTML += `
<option value="${destination.id}">
${destination.name}
</option>
`;

});

}

async function loadVilla(){

if(!villaId){
alert('ID villa mancante');
window.location.href='villas.html';
return;
}

const { data, error } =
await supabaseClient
.from('villas')
.select('*')
.eq('id', villaId)
.single();

if(error){
alert(error.message);
return;
}

document.getElementById('title').value = data.title || '';
document.getElementById('cin').value = data.cin || '';
document.getElementById('destination_id').value = data.destination_id || '';
document.getElementById('owner_name').value = data.owner_name || '';
document.getElementById('owner_phone').value = data.owner_phone || '';
document.getElementById('owner_email').value = data.owner_email || '';
document.getElementById('status').value = data.status || 'standby';
document.getElementById('address').value = data.address || '';
document.getElementById('latitude').value = data.latitude || '';
document.getElementById('longitude').value = data.longitude || '';
document.getElementById('bedrooms').value = data.bedrooms || '';
document.getElementById('bathrooms').value = data.bathrooms || '';
document.getElementById('max_guests').value = data.max_guests || '';
document.getElementById('cadastral_sheet').value = data.cadastral_sheet || '';
document.getElementById('cadastral_parcel').value = data.cadastral_parcel || '';
document.getElementById('cadastral_subunit').value = data.cadastral_subunit || '';
document.getElementById('short_description').value = data.short_description || '';
document.getElementById('full_description').value = data.full_description || '';

updateMapPreview();

}

async function loadImages(){

const { data, error } =
await supabaseClient
.from('villa_images')
.select('*')
.eq('villa_id', villaId);

if(error){
console.error(error);
return;
}

data.forEach(image=>{

const map = {
main:'preview-main',
exterior:'preview-exterior',
living:'preview-living',
bedroom:'preview-bedroom',
bathroom:'preview-bathroom',
pool:'preview-pool'
};

const img = document.getElementById(map[image.image_type]);

if(img){
img.src = image.image_url;
img.style.display = 'block';
}

});

}

function detectLocation(){

if(!navigator.geolocation){
alert('Geolocalizzazione non supportata da questo browser');
return;
}

navigator.geolocation.getCurrentPosition(
position => {

document.getElementById('latitude').value = position.coords.latitude;
document.getElementById('longitude').value = position.coords.longitude;

updateMapPreview();

alert('Posizione GPS rilevata');

},
error => {
alert('Impossibile rilevare la posizione: ' + error.message);
},
{
enableHighAccuracy:true,
timeout:15000,
maximumAge:0
}
);

}

function updateMapPreview(){

const lat = document.getElementById('latitude').value;
const lng = document.getElementById('longitude').value;

const mapFrame = document.getElementById('mapFrame');
const mapEmpty = document.getElementById('mapEmpty');

if(!lat || !lng){

mapFrame.style.display = 'none';
mapEmpty.style.display = 'flex';

return;

}

const delta = 0.005;

const bbox =
`${parseFloat(lng)-delta},${parseFloat(lat)-delta},${parseFloat(lng)+delta},${parseFloat(lat)+delta}`;

mapFrame.src =
`https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${lat},${lng}`;

mapFrame.style.display = 'block';
mapEmpty.style.display = 'none';

}

function openMap(){

const lat = document.getElementById('latitude').value;
const lng = document.getElementById('longitude').value;

if(!lat || !lng){
alert('Coordinate mancanti');
return;
}

window.open(
`https://www.google.com/maps?q=${lat},${lng}`,
'_blank'
);

}

function createSlug(text){

return text
.toLowerCase()
.trim()
.replaceAll(' ','-')
.replace(/[^a-z0-9-]/g,'');

}

async function updateVilla(){

const title = document.getElementById('title').value;
const destinationId = parseInt(document.getElementById('destination_id').value);

if(!title){
alert('Inserisci il nome della villa');
return;
}

if(!destinationId){
alert('Seleziona una destinazione');
return;
}

const villa = {
title:title,
slug:createSlug(title),
cin:document.getElementById('cin').value,
destination_id:destinationId,
owner_name:document.getElementById('owner_name').value,
owner_phone:document.getElementById('owner_phone').value,
owner_email:document.getElementById('owner_email').value,
status:document.getElementById('status').value,
address:document.getElementById('address').value,
latitude:document.getElementById('latitude').value || null,
longitude:document.getElementById('longitude').value || null,
bedrooms:document.getElementById('bedrooms').value || null,
bathrooms:document.getElementById('bathrooms').value || null,
max_guests:document.getElementById('max_guests').value || null,
cadastral_sheet:document.getElementById('cadastral_sheet').value,
cadastral_parcel:document.getElementById('cadastral_parcel').value,
cadastral_subunit:document.getElementById('cadastral_subunit').value,
short_description:document.getElementById('short_description').value,
full_description:document.getElementById('full_description').value
};

const { error } =
await supabaseClient
.from('villas')
.update(villa)
.eq('id', villaId);

if(error){
alert(error.message);
return;
}

alert('Villa aggiornata');

window.location.href='villas.html';

}

async function uploadImage(event, imageType, previewId){

const file = event.target.files[0];

if(!file){
return;
}

const filePath =
`${villaId}/${imageType}-${Date.now()}-${file.name}`;

const upload =
await supabaseClient.storage
.from('villa-images')
.upload(filePath, file);

if(upload.error){
alert(upload.error.message);
return;
}

const publicUrl =
supabaseClient.storage
.from('villa-images')
.getPublicUrl(filePath)
.data.publicUrl;

await supabaseClient
.from('villa_images')
.delete()
.eq('villa_id', villaId)
.eq('image_type', imageType);

const { error } =
await supabaseClient
.from('villa_images')
.insert([{
villa_id:villaId,
image_url:publicUrl,
image_type:imageType
}]);

if(error){
alert(error.message);
return;
}

const preview = document.getElementById(previewId);

preview.src = publicUrl;
preview.style.display = 'block';

alert('Foto caricata');

}

async function deleteImage(imageType, previewId){

if(!confirm('Eliminare questa foto?')){
return;
}

const { error } =
await supabaseClient
.from('villa_images')
.delete()
.eq('villa_id', villaId)
.eq('image_type', imageType);

if(error){
alert(error.message);
return;
}

const preview = document.getElementById(previewId);

preview.src = '';
preview.style.display = 'none';

}

function cancelEdit(){

if(confirm('Annullare le modifiche e tornare alla lista ville?')){
window.location.href = 'villas.html';
}

}

async function logout(){

await supabaseClient.auth.signOut();

window.location.href = "login.html";

}

</script>

</body>
</html>
