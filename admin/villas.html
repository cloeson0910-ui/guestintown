<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ville</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
padding:30px;
max-width:1200px;
margin:auto;
}

.menu{
display:flex;
gap:15px;
align-items:center;
margin-bottom:30px;
}

.menu a,
.menu button{
background:#222;
color:white;
padding:10px 15px;
text-decoration:none;
border:0;
border-radius:6px;
cursor:pointer;
}

.menu a:hover,
.menu button:hover{
background:#333;
}

.menu .logout{
margin-left:auto;
background:#c0392b;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

a.button{
background:#c9a96e;
color:black;
padding:12px 20px;
text-decoration:none;
font-weight:bold;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
background:#1b1b1b;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
text-align:left;
}

th{
background:#222;
}

.status{
padding:6px 10px;
border-radius:20px;
font-size:12px;
}

.standby{
background:orange;
color:black;
}

.approved{
background:green;
}

.rejected{
background:red;
}

button{
padding:8px 12px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="villas.html">Ville</a>
<a href="villa-form.html">Nuova Villa</a>
<a href="destinations.html">Destinazioni</a>
<button onclick="logout()" class="logout">Logout</button>
</div>

<div class="topbar">
<h1>Ville</h1>
<a href="villa-form.html" class="button">+ Nuova Villa</a>
</div>

<table>
<thead>
<tr>
<th>Villa</th>
<th>Destinazione</th>
<th>Proprietario</th>
<th>Stato</th>
<th>Azioni</th>
</tr>
</thead>

<tbody id="villasTable"></tbody>
</table>

<script>

checkAuth();

async function checkAuth(){

const { data } =
await supabaseClient.auth.getUser();

if(!data.user){
window.location.href = "login.html";
return;
}

loadVillas();

}

async function loadVillas(){

const { data , error } =
await supabaseClient
.from('villas')
.select(`
id,
title,
status,
owner_name,
destinations(name)
`)
.order('created_at',{ascending:false});

if(error){
console.error(error);
alert(error.message);
return;
}

const table =
document.getElementById('villasTable');

table.innerHTML='';

data.forEach(villa=>{

table.innerHTML += `
<tr>
<td>${villa.title || ''}</td>
<td>${villa.destinations?.name || ''}</td>
<td>${villa.owner_name || ''}</td>
<td>
<span class="status ${villa.status}">
${villa.status || ''}
</span>
</td>
<td>
<button onclick="window.location.href='villa-edit.html?id=${villa.id}'">
Modifica
</button>

<button onclick="deleteVilla(${villa.id})">
Elimina
</button>
</td>
</tr>
`;

});

}

async function deleteVilla(id){

if(!confirm('Eliminare questa villa?')){
return;
}

const { error } =
await supabaseClient
.from('villas')
.delete()
.eq('id',id);

if(error){
alert(error.message);
return;
}

loadVillas();

}

async function logout(){

await supabaseClient.auth.signOut();

window.location.href = "login.html";

}

</script>

</body>
</html>
