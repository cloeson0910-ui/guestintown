
<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuova Villa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#111;
color:white;
padding:30px;
max-width:900px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
}

button{
padding:12px 20px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Nuova Villa</h1>

<input id="title" placeholder="Nome Villa">

<input id="cin" placeholder="CIN">

<label>Destinazione</label>

<select id="destination_id">

<option value="">
Seleziona destinazione
</option>

</select>
<input id="owner_name" placeholder="Nome Proprietario">

<input id="owner_phone" placeholder="Telefono Proprietario">

<input id="owner_email" placeholder="Email Proprietario">

<button onclick="saveVilla()">
Salva Villa
</button>

<script>
loadDestinations();

async function loadDestinations(){

const { data , error } =
await supabaseClient
.from('destinations')
.select('id,name')
.order('name');

if(error){

console.error(error);

return;

}

const select =
document.getElementById('destination_id');

data.forEach(destination=>{

select.innerHTML += `
<option value="${destination.id}">
${destination.name}
</option>
`;

});

}
async function saveVilla(){

const villa = {

title: document.getElementById('title').value,

cin: document.getElementById('cin').value,

city: document.getElementById('city').value,

owner_name: document.getElementById('owner_name').value,

owner_phone: document.getElementById('owner_phone').value,

owner_email: document.getElementById('owner_email').value,

status:'standby'

};

const { error } =
await supabaseClient
.from('villas')
.insert([villa]);

if(error){

console.error(error);
alert(JSON.stringify(error,null,2));

return;

}

alert('Villa salvata');

window.location.href='villas.html';


}

</script>

</body>

</html>
