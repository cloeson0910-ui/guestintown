<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuova Villa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#111;
color:white;
padding:30px;
max-width:900px;
margin:auto;
}

.menu{
display:flex;
gap:15px;
align-items:center;
margin-bottom:30px;
}

.menu a,
.menu button{
background:#222;
color:white;
padding:10px 15px;
text-decoration:none;
border:0;
border-radius:6px;
cursor:pointer;
}

.menu a:hover,
.menu button:hover{
background:#333;
}

.menu .logout{
margin-left:auto;
background:#c0392b;
}

h1{
margin-bottom:20px;
}

input,
select{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
}

button.save{
background:#c9a96e;
color:black;
font-weight:bold;
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="villas.html">Ville</a>
<a href="villa-form.html">Nuova Villa</a>
<a href="destinations.html">Destinazioni</a>
<button onclick="logout()" class="logout">Logout</button>
</div>

<h1>Nuova Villa</h1>

<input id="title" placeholder="Nome Villa">

<input id="cin" placeholder="CIN">

<label>Destinazione</label>

<select id="destination_id">
<option value="">Seleziona destinazione</option>
</select>

<input id="owner_name" placeholder="Nome Proprietario">

<input id="owner_phone" placeholder="Telefono Proprietario">

<input id="owner_email" placeholder="Email Proprietario">

<button class="save" onclick="saveVilla()">
Salva Villa
</button>

<script>

checkAuth();

async function checkAuth(){

const { data } =
await supabaseClient.auth.getUser();

if(!data.user){

window.location.href = "login.html";
return;

}

loadDestinations();

}

async function loadDestinations(){

const { data , error } =
await supabaseClient
.from('destinations')
.select('id,name')
.order('name');

if(error){

console.error(error);
alert(error.message);
return;

}

const select =
document.getElementById('destination_id');

data.forEach(destination=>{

select.innerHTML += `
<option value="${destination.id}">
${destination.name}
</option>
`;

});

}

async function saveVilla(){

const destinationId =
parseInt(document.getElementById('destination_id').value);

if(!destinationId){

alert('Seleziona una destinazione');
return;

}

const villa = {

title: document.getElementById('title').value,

slug: document.getElementById('title').value
.toLowerCase()
.replaceAll(' ','-'),

cin: document.getElementById('cin').value,

destination_id: destinationId,

owner_name: document.getElementById('owner_name').value,

owner_phone: document.getElementById('owner_phone').value,

owner_email: document.getElementById('owner_email').value,

status:'standby'

};

const { error } =
await supabaseClient
.from('villas')
.insert([villa]);

if(error){

console.error(error);
alert(error.message);
return;

}

alert('Villa salvata');

window.location.href='villas.html';

}

async function logout(){

await supabaseClient.auth.signOut();

window.location.href = "login.html";

}

</script>

</body>

</html>
