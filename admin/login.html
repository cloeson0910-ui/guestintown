<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Guest In Town - Login Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

.login-box{
    width:400px;
    background:#1e1e1e;
    padding:30px;
    border-radius:12px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Guest In Town Admin</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Accedi
</button>

</div>

<script>

async function login(){

    const email =
        document.getElementById('email').value;

    const password =
        document.getElementById('password').value;

    const { error } =
        await supabaseClient.auth.signInWithPassword({
            email,
            password
        });

    if(error){
        alert(error.message);
        return;
    }

    alert("Login effettuato con successo!");

}

</script>

</body>
</html>
