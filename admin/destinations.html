<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Destinazioni</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<style>
body{font-family:Arial,sans-serif;background:#111;color:white;padding:30px;max-width:1150px;margin:auto;}
.menu{display:flex;gap:15px;align-items:center;margin-bottom:30px;flex-wrap:wrap;}
.menu a,.menu button{background:#222;color:white;padding:10px 15px;text-decoration:none;border:0;border-radius:6px;cursor:pointer;}
.menu .logout{margin-left:auto;background:#c0392b;}
h1{margin-bottom:20px;}
.form{background:#1b1b1b;padding:20px;border-radius:10px;margin-bottom:30px;}
input{width:100%;padding:12px;margin-bottom:15px;border:none;border-radius:6px;box-sizing:border-box;}
button.save{background:#c9a96e;color:black;font-weight:bold;padding:12px 20px;border:none;border-radius:6px;cursor:pointer;}
button.delete{background:#c0392b;color:white;border:none;padding:8px 10px;border-radius:6px;cursor:pointer;}
table{width:100%;border-collapse:collapse;background:#1b1b1b;}
th,td{padding:12px;border-bottom:1px solid #333;text-align:left;vertical-align:top;}
th{background:#222;}
.preview{width:150px;height:95px;object-fit:cover;border-radius:8px;background:#222;display:block;margin-bottom:8px;}
.small{font-size:12px;color:#aaa;line-height:1.5;}
</style>
</head>

<body>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="villas.html">Ville</a>
<a href="villa-form.html">Nuova Villa</a>
<a href="destinations.html">Destinazioni</a>
<a href="towns.html">Paesi</a>
<button onclick="logout()" class="logout">Logout</button>
</div>

<h1>Destinazioni</h1>

<div class="form">
<input id="name" placeholder="Nome destinazione / provincia">
<input id="country" placeholder="Paese">
<input id="image_url" placeholder="URL immagine destinazione">
<input id="image_file" type="file" accept="image/*">
<button class="save" onclick="saveDestination()">Salva Destinazione</button>
</div>

<table>
<thead>
<tr>
<th>Foto</th>
<th>Nome</th>
<th>Slug</th>
<th>Paese</th>
<th>Immagine</th>
<th>Azioni</th>
</tr>
</thead>

<tbody id="destinationsTable"></tbody>
</table>

<script>

checkAuth();

async function checkAuth(){
const { data } = await supabaseClient.auth.getUser();

if(!data.user){
window.location.href = "login.html";
return;
}

loadDestinations();
}

function createSlug(text){
return text
.toLowerCase()
.trim()
.replaceAll(' ','-')
.replace(/[^a-z0-9-]/g,'');
}

async function uploadLocationImage(file, folder){

if(!file){
return '';
}

const cleanName =
file.name
.toLowerCase()
.replaceAll(' ','-')
.replace(/[^a-z0-9.\-_]/g,'');

const filePath =
`${folder}/${Date.now()}-${cleanName}`;

const upload =
await supabaseClient.storage
.from('location-images')
.upload(filePath, file, {
cacheControl:'3600',
upsert:false
});

if(upload.error){
alert(upload.error.message);
return '';
}

const publicUrl =
supabaseClient.storage
.from('location-images')
.getPublicUrl(filePath)
.data.publicUrl;

return publicUrl;
}

async function saveDestination(){

const name = document.getElementById('name').value.trim();
const country = document.getElementById('country').value.trim();
let imageUrl = document.getElementById('image_url').value.trim();
const imageFile = document.getElementById('image_file').files[0];

if(!name){
alert('Inserisci il nome della destinazione');
return;
}

if(imageFile){
const uploadedUrl = await uploadLocationImage(imageFile, 'destinations');

if(!uploadedUrl){
return;
}

imageUrl = uploadedUrl;
}

const destination = {
name:name,
slug:createSlug(name),
country:country,
image_url:imageUrl || null,
active:true
};

const { error } =
await supabaseClient
.from('destinations')
.insert([destination]);

if(error){
alert(error.message);
return;
}

document.getElementById('name').value='';
document.getElementById('country').value='';
document.getElementById('image_url').value='';
document.getElementById('image_file').value='';

loadDestinations();
}

async function loadDestinations(){

const { data, error } =
await supabaseClient
.from('destinations')
.select('*')
.order('name');

if(error){
alert(error.message);
return;
}

const table = document.getElementById('destinationsTable');

table.innerHTML='';

data.forEach(destination=>{

table.innerHTML += `
<tr>
<td>
${destination.image_url ? `<img class="preview" src="${destination.image_url}">` : '<div class="small">Nessuna foto</div>'}
</td>

<td>
<input id="name-${destination.id}" value="${destination.name || ''}">
</td>

<td>${destination.slug || ''}</td>

<td>
<input id="country-${destination.id}" value="${destination.country || ''}">
</td>

<td>
<input id="image-${destination.id}" value="${destination.image_url || ''}" placeholder="URL immagine">
<input id="file-${destination.id}" type="file" accept="image/*">
<div class="small">Puoi incollare un URL o caricare una nuova foto dal PC.</div>
</td>

<td>
<button class="save" onclick="updateDestination(${destination.id})">
Salva
</button>
<br><br>
<button class="delete" onclick="deleteDestination(${destination.id})">
Elimina
</button>
</td>
</tr>
`;

});

}

async function updateDestination(id){

const name = document.getElementById(`name-${id}`).value.trim();
const country = document.getElementById(`country-${id}`).value.trim();
let imageUrl = document.getElementById(`image-${id}`).value.trim();
const imageFile = document.getElementById(`file-${id}`).files[0];

if(!name){
alert('Il nome destinazione è obbligatorio');
return;
}

if(imageFile){
const uploadedUrl = await uploadLocationImage(imageFile, 'destinations');

if(!uploadedUrl){
return;
}

imageUrl = uploadedUrl;
}

const { error } =
await supabaseClient
.from('destinations')
.update({
name:name,
slug:createSlug(name),
country:country,
image_url:imageUrl || null
})
.eq('id',id);

if(error){
alert(error.message);
return;
}

loadDestinations();
}

async function deleteDestination(id){

if(!confirm('Eliminare questa destinazione?')){
return;
}

const { error } =
await supabaseClient
.from('destinations')
.delete()
.eq('id',id);

if(error){
alert(error.message);
return;
}

loadDestinations();
}

async function logout(){
await supabaseClient.auth.signOut();
window.location.href = "login.html";
}

</script>

</body>
</html>
